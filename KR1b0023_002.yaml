body:
  text: 書集傳或問卷下宋陳大猷撰説命上林氏曰古者祖有功宗有德創業之有功者祀以為祖守文之有德者祀以為宗其廟皆百世不毁商立廟制所祖者湯所宗者太甲太戊武丁太甲為太宗太戊為中宗武丁為髙宗其制至漢猶存髙祖世祖皆為一代之祖前漢以文帝為太宗武帝為世宗宣帝為中宗後漢以明帝為顯宗章帝為肅宗皆以功德而祖宗之也唐自太宗至昭宗十八帝皆為宗名為廟號之常稱不復論德建為不毁之廟而先王立宗之制紊矣此説善東陽馬氏曰三年之制漢文帝以日易月二十七日而畢後世悉遵用之夫天子持三年之喪則百官亦須用持其禮幾於難行至於二十七日喪畢之説則又幾於不持喪然則若之何而可曰行二十七日之制於臨朝聽政之時而行三年之制於宫中則於禮不廢於義亦不廢此通行之道也壽皇持髙宗之喪如此袁氏曰髙宗不言中有多少工夫所以能神交上帝所以能得良弼皆自不言中来大抵寡言者其工夫必深多言者其工夫必淺寡言者其工夫日積多言者其工夫馳㪚如人之哀樂喜怒藴蓄於中未便㪚若泄之於外則不乆而息故古者言之不出恥躬之不逮也孔子亦云予欲無言古之進道者其言語極少誠以多言最減力譬之天将雨迅雷一震徃徃未必有雨何則其氣泄故也髙宗三年不言既免喪而猶不言則其涵養于中者為何如哉吕氏曰自古聖賢常自恐懼中入台恐德弗類此入聖作德之門户也學者亦當常懐此心常情懈怠弛慢放流入於庸愚而不自知或曰德弗𩔖猶弗稱也記曰天子與天地參故德配天地此德之𩔖者亦通王氏曰古之人齊三日以致其思必見其所為齊者况于恭黙思道致一而深思則感格上帝夢賚良弼蓋無足怪者淺陋之人不知天人之際至誠可以感通如此或謂商俗尚神引天以神其事此妄意先王矯誣上帝以布命於下此最害教之大者三山陳氏曰至誠之道可以前知嵩前有董五經隱者也伊川聞其名特徃造焉至中途遇之曰君非程先生乎先生欲来信息甚大君子問於伊川伊川曰静則自明此則髙宗夢説之事不誣矣又曰髙宗之夢如明鏡當鏡臺有物必照初非鑑徃亦非物来陳氏曰髙宗誠心如此向使不夢良弼天下之賢亦有縁感至者亦善夏氏曰作礪作舟楫作霖雨蓋望之切頼之深言之不足故重言之王氏乃謂作礪使之治己舟楫使之濟難霖雨使之澤民失之穿鑿下文言啟乃心沃朕心則髙宗惟欲其成己徳而已未及乎濟難澤民也此説善林氏曰桀以拒諫喪湯以從諫興紂以拒諫喪武王以從諫興秦隋以拒諫喪漢髙祖唐太宗以從諫興歴代興衰之本未嘗不係乎此髙宗命傅説以納諫而傅説復之以從諫蓋以為天下之事未有不先於此故禮樂刑政未嘗一言及之而惟以此相告勉此説亦善説命中或問天聦明諸儒皆以視聽言之子獨不然曰聦明之義堯典説之詳矣夫天視自我民視天聽自我民聽方可以視聽言然亦自民而言之非謂天果有耳目也新安王氏之説亦近之王曰憲天聦明則見聞不在耳目即此一心此心洞然與天為一無毫釐私偽蔽乎其間則察乎衆人之所不及見通乎衆人之所不及聞謂心之所存無非天理故其聦明無異天之聦明也吕氏曰佛老説聦明正就虗處説但言吾心湛然而已聖賢説聦明皆在實處理㑹口與甲胄等四事者疑若粗傅説却欲髙宗於此留心蓋天下之理本無精粗才理㑹得粗處透便理㑹得精處透四事自迹觀之何與聦明然知起羞起戎在笥省躬非聦明不能是所謂克明也無垢張氏曰人之好善者多喜聞人之賛而惡聞人之謗非好勝也以其好善之心急惟恐惡之染其身也是以恥過而遂非其實以善為之反自䧟於不善此為善者之大病也梁武帝心欲為善而不知其道凡人之所難者皆為之一聞賀琛之諫乃大怒此非尋常無知之過也其病最深惟力行者知之吕氏曰人有好底病有不好底病髙宗之黷祀是好底病最難治惟説能之無垢張氏曰數於祭祀所以敬也而反墮於不敬此過難知而亦難言難知則心安難言則諫者必拒或問惟説不言有厥咎諸家皆謂君已成德則臣方敢言如何曰君資臣之言正以德之未成故耳德苟已成則何俟於臣言而臣欽若将順亦有所不必言也以君能行之而後言則可若以君德己成而後言則德之未成者果何頼哉曰林氏謂允協先王成德為能合成湯從諫弗咈之德故言惟説不言有厥咎曰從諫固能成德然謂成德為從諫則牽強矣且髙宗謂説之言㫖哉乃不良于言予罔聞于行蓋賛美其言之可行耳非於此方求其言也故説答以知我之言易行我之言難我既己言則已無咎矣所以益勉髙宗之行也説命下或問甘盤之事孔氏蘇氏説如何曰唐孔氏謂甘盤在小乙之世已為大臣小乙崩受遺輔政及髙宗免喪甘盤已死此説與君奭之書不相背矣然二孔以遯于荒野為髙宗自遯故學而中廢雖文勢為順及與舊勞于外之言相應然髙宗之勞于外乃是未即位前之事雜於其中其説不免首尾自相戾蘇氏謂古之君子雖明王之世不肯仕如巢由夷齊之比則以甘盤為隱而不仕與君奭之書又相背矣皆不若林説為善吕氏曰自髙宗言之凡人學未知味失其師猶不覺既知味而失其師如中流失楫髙宗之學正頼於説自甘盤言之終不成教髙宗一半便棄去此乃甘盤深教髙宗處若使甘盤常在左右髙宗常依靠人了未必進歩惟被它翻然引去髙宗乃能力求其進過人數等此説亦善或問道我所固有也本未嘗去何謂之来本未嘗㪚何謂之積曰是固然也人惟蔽於物欲放而不求故未嘗来蕩而不收故未嘗積今學力既加修者始来来自吾心而非由外至也来者始積積於吾身而非由外假也王氏張氏謂學自外至故言乃来蓋不知所學之事皆吾性分本然之性曷嘗强其所無哉或問諸家多以遜志為卑遜子以遜順平易為説何也曰言遜順則從容卑遜之意皆存於中而卑遜却不足以包從容涵養之意也㤗誓呉氏曰孔子論文王曰有事君之小心又曰三分天下有其二以服事殷周之德其可謂至德矣詩序曰西有昆夷之患北有玁狁之難以天子之命命将帥遣戍役以守衛中國當紂為四夷交侵之時文王猶禀命如此觀文王之心之德與其禀命恐所謂大勲者初未嘗有意也至武王之時則紂之惡極矣武王雖欲為文王之順而仁有所不忍故奉天命以征之方欲誓諸侯以必其征伐之功其叙文王之辭蓋不得不然後世讀書至惟九年大統未集予小子其承厥志讀詩至武王廣文王之聲卒其伐功與此之𩔖皆當三思詩序與孔子之言此説善蔡氏曰百姓有過在予一人廣韻云過責也武王言天之視聽皆自乎民今民皆有責於我謂我不正商罪以民心而察天意則我之伐商斷必徃矣蓋百姓畏紂之虐望周之深而責武王不即拯己於水火也如湯東面而征西夷怨南面而征北狄怨之意愚按此説雖近鑿然上下亦通併附於此牧誓或問孟子史記皆言虎賁三千人諸儒皆從之而以書序為誤如何林氏曰虎賁之士必擇其驍勇絶人者為之在王左右以為宿衛周禮虎賁氏八百人成王崩時以虎賁百人逆子釗當成周全盛時其數不過如此武王戎車三百兩則甲士歩卒皆在焉而虎賁則在王左右以為輔衛其有三百人已為多矣安得尚疑其少而以為三千人邪蓋史記孟子之書誤矣或問漢孔氏謂朝歌去河四百里牧野在朝歌南三十里武王渡河五日而至赴敵宜速諸儒為師行三十里武王仁義節制之師不應速於趨利如此皇甫謐云牧野去朝歌七十里然自河至此亦計三百三十里亦非五日所能至夫謂牧野去朝歌三十里七十里蓋據近郊三十里逺郊七十里而言也然漢孔氏謂河去朝歌四百里則其所謂親見而非臆説諸儒求其説而不得何也曰予以禹貢河行之道推堯時河自碣石入海蓋在東北之極至漢時則河流入海在青齊之間至近世則河流愈南而近汴泗大抵河流自古至今自北而愈南竊意武王時河北距朝歌必切近自孔氏去武王時河行之道變矣或曰河行南北信有之矣然説者謂朝歌在今衛州孟津在今孟州河流雖改易而孟津之至衛則未嘗改易也曰世代寥逺地里遷易不常漢武帝東移函谷闗七百里而亦謂之函谷闗秦時㑹稽治在今呉縣與今㑹稽縣相去亦數百里則古今地里之逺近豈易以名拘要之武王之師决不應以五日而行三百餘里也武成或問生明孔安國以為月三日孔頴達以為生明死魄俱是月初而諸儒多從安國之説如何曰朔日月己生明但其明處極微昧明生則魄死矣故為始死魄魄死則明生矣故為哉生明薛氏謂哉生明一日也旁死魄月二日也至望日則明全生而魄全死自望後一日則月生魄魄生則明死矣至晦日則明全死而魄全生故每月之終謂之晦以其魄全晦故也毎月之始謂之朔以其明初見故也於晦朔觀月則可見故知當以頴達之説為正諸儒皆以哉生魄為十六日既望之後一日魄始生而望或在十五日或在十六日或在十四日不可定指十六日為既生魄也愚曰告天地山川非同一祭亦非同時舉其大要緫述之耳肆予東征士女篚厥𤣥黄當是告山川之辭蓋起兵東征未至紂都㳂路人已迎降如此若告天地乃是未舉兵之初告而後行安得預言士女迎降之事乎或以為是指戡黎之時言之亦未可知呉才老曰湯武之師順乎人而應乎天者盖無一而不聽於天也師出自周踰月而後至既陳商郊俟天休命彼果於致伐者不必若是矣使紂于是時下罪己之詔取平日惡黨而戮之見諸侯而謝其不德願徼福於成湯髙宗以無乏其祀彼八百諸侯或有為之動心者武王未必致伐也今乃率離心之人犯同德之師一矢未加而前徒己倒戈矣天之休命遂集於周而武王亦順而受之嗚呼湯武之有天下豈有心為之耶或問孟子言盡信書不如無書書其有不足信者乎東陽馬氏曰六經經秦火又漢儒私相傳授誠難盡信然血流漂杵却不用疑蓋史官紀其成功則為之辭以侈其事而已安用致疑而立議論乎或曰然則孟子非乎曰孟子又幾曽錯史官大而言之亦不妨孟子疑之亦不妨凡讀書須自有活法如浩浩滔天天髙如此其可漫之乎此血流漂杵之比並也晦菴曰孟子之設是言懼後世之惑且長不仁之心耳薛氏曰桀紂罪有淺深湯武之放弑應乎天而順乎人非湯武所能為也荀卿謂紂卒易向而弑紂賈誼書曰紂将與武王戰陳其卒左億右億鼓之不進皆還其刃向紂紂走還寝廟鬭死棄其尸于王門之外民皆進蹙之武王使帷而守之觀者褰帷提尸投之者猶未肯止其言畧與書合最可信觀商人怨紂如此雖欲如桀之放得乎此説善或問微子帝乙元子而有賢德武王克商之後冝奉微子以繼商返二分之天下而退就諸侯之位則當與堯舜並而湯不足追矣曰殷周之時世變已降非復隆古之比紂之死殷人實殺之使武王欲以天下遜微子一時殷人及八百諸侯能自安乎夫益佐禹治水功徳豈在啟之下况禹又薦益於天然朝覲謳歌不之益而之啟雖禹之治命不能遏微子雖賢不及武王之聖微子事紂施澤未必洽於民而周世世積行累功三分天下有其二人心之歸乆矣使武王欲以天下與微子亦不能奪諸侯天下之心易曰湯武革命應乎天而順乎人蓋湯武處世變之極不過能為順人之事而已而堯舜不可幾及也或問建官惟用賢人然官各有事賢人各有所能如舜九官皆官也而官所職之事則有守司徒司空作士作稷之異禹臯稷契皆賢也而其能則有治水明刑播種敷教之殊故建官以賢又必随其人之所能以位其事也愚按此説雖欠才徳並用之意然分别官與事亦不可不知也故附於此洪範林少頴曰紂之見殺蓋商人倒戈相攻併攻殺紂武王至商欲赦紂不誅如湯放桀已無及矣於是立武庚代商後亦所以致其不忍之意如湯放桀也蘇氏曰治民而求勝民者必亡國治病而求勝病者必殺人堯言鯀方命圮族楚詞言鯀悻直以亡身知其為剛狠好勝者五行土勝水鯀知此而不通其變夫物之方壯不達其怒而投之以其所畏其争必大豈獨水哉康節邵氏曰圓者星也厯紀之數其肇於此乎朱氏曰厯法合二始以定剛柔謂天數始於一地數始於二也合二中以定律厯謂天數中於五地數中於六也合二終以紀閏餘謂天數終於九地數終於十是所謂律厯也方者土也畫州井地之法其倣於此乎朱氏曰州有九井九百畆是所謂畫州井地也蓋圓者河圖之數方者洛書之文故羲文因之以造易禹箕叙之以作範也蔡元定曰九宫之數戴九履一左三右七二四為肩六八為足正龜背之象也易大傳曰天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也朱氏曰此夫子所以發明河圖之數也天地之間一氣而已分而為二則為隂陽而五行造化萬物終始無不管攝於是故河圖之位一與六共宗而居乎北二與七為朋而居乎南三與八同道而居乎東四與九為友而居乎西五與十相守而居乎中蓋其所以為數者不過一隂一陽一竒一耦以兩其五行而已天者陽之輕清而位乎上者也地者隂之重濁而位乎下者也陽數竒故一三五七九皆屬乎天所謂天數五也隂數耦故二四六八十皆屬乎地所謂地數五也天數地數各以其𩔖而相求所謂五位之相得者也天以一生水而地以六成之地以二生火而天以七成之天以三生木而地以八成之地以四生金而天以九成之天以五生土而地以十成之此所謂各有合者也此河圖之全數而諸儒之説也至洛書雖夫子所未言然其象其説已具於前有以通之則劉歆所謂經緯表裏者可見矣或曰河圖洛書之數其所以不同何也曰河圖以五生數統五成數而同處其方蓋揭其全以示人而道其常數之體也洛書以五竒數統四偶數而各居其所蓋主於陽以統隂而肇其變數之用也曰其皆以五居中者何也曰凡數之始一隂一陽而已矣陽之象圓圓者徑一而圍三隂之象方方者徑一而圍四圍三者以一為一故參其一陽而為三圍四者以二為一故兩其一隂而為二所謂參天兩地者也三二之合則為五矣此河圖洛書之數所以皆以五為中也然河圖以生數為主故其中之所以為五者亦具五生數之象其下一㸃天一之象也其上一㸃地二之象也其左一㸃天三之象也其右一㸃地四之象也其中一㸃天五之象也洛書以竒數為主故其中之所以為五者亦具五竒數之象其下一㸃天一之象也其左一㸃亦天三之象也其中一㸃亦天五之象也其右一㸃則天七之象也其上一㸃則天九之象也其數與位皆三同而二異蓋陽不可易而隂可易成數雖陽固亦生之隂也曰中央之為數也奈何曰中央通乎一圖由内及外固各有積實可紀之數然河圖之一二三四各居其五象本方之外而六七八九十者又各因五而得數以附于其生數之外洛書之一三七九亦各居其五象本方之外而二四六八者又各因其𩔖以附于竒數之側蓋中者為主而外者為客正者為君而側者為臣亦各有條而不紊也曰其多寡之不同何也曰河圖主全故極於十而竒耦之位均論其積實然後見其耦贏而竒乏也洛書主變故極於九而其位與實皆竒贏而耦乏也横渠張氏曰數止於十窮則自十而反一又數當止於九九陽極也地數無過天數之理孰有地大於天乎十也者姑為九之偶焉耳必皆虗其中然後隂陽之數均於二十而無偏耳曰其序之不同何也曰河圖以生出之次言之則始下次上次左次右以復於中而又始于下也以運行之次言之則始東次南次中次西次北右旋一周而又始于東也其生數之在内者則陽居下左而隂居上右也其成數之在外者則隂居下左而陽居上右也洛書之次其陽數則首北次東次中次西次南其隂數則首西南次東南次西北次東北也合而言之則首北次西南次東次東南次中次西北次西次東北而究于南也其運行則水克火火克金金克木木克土右旋一周而土復克水也是亦各有説矣曰其七八九六之數不同何也曰河圖六七八九既附於生數之外矣北隂陽老少進退饒乏之正也其九者生數一三五之積也故自北而東自東而西以成于四之外其六者生數二四之積也故自南而西自西而北以成于一之外七則九之自西而南者也八則六之自北而東者也此又隂陽老少互蔵其宅之變也洛書之縱横十五而七八九六迭為消長虗五分十而一含九二含八三含七四含六則參互錯綜無適而不遇其合焉此變化無窮之所以為妙也曰然則聖人之則之也奈何曰則河圖者虗其中則洛書者緫其實也河圖之虗五與十者太極也竒數二十偶數二十者兩儀也以一二三四為六七八九者四象也析四方之合以為乾坤離坎補四隅之空以為兑震艮巽者八卦也洛書之實其一為五行其二為五事其三為八政其四為五紀其五為皇極其六為三徳其七為稽疑其八為庶徴其九為福極其位與數尤曉然矣曰洛書而虗中五則亦太極也竒偶之各居二十則亦兩儀也一二三四而含九八七六縱横十五而互為七八九六則亦四象也四方之正以為乾坤離坎四隅之偏以為兑震艮巽則亦八卦也河圖之一六為水二七為火三八為木四九為金五十為土則固洪範之五行而五十五者又九疇之子目也是洛書固可以為易而河圖亦可以為範矣是其時雖有先後數雖有多寡其為理則一而已但易乃伏羲之所先得乎圖而初無待於書範則禹之所獨得乎書而未必追考於圖爾且以河圖而虗十則洛書四十有五之數也虗五則大衍五十之數也積五與十則洛書縱横十五之數也以五乗十以十乗五則又皆大衍之數也洛書之五又自含五則得十而通為大衍之數矣積五與十則得十五而通為河圖之數矣茍明乎此則横斜曲直無所不通而河圖洛書又豈有先後彼此之間哉蔡元定曰天地之理一而已矣雖時有古今其理固不容於有二也不特河圖洛書為然律吕有五聲十二律而其相乗之數究於六十日名有十幹十二支而其相乗之數亦究於六十者皆出於易之後其起數又各不同然與易之隂陽䇿數老少自相配合皆為六十無不若合符契下至運氣參同太乙之屬雖不足道然亦無不相通蓋自然之理也假令今世復有圖書者出其數亦必相符或問晦菴以為洛書之有竒偶之數自一至九而無文字禹因而𩔖之則以初一曰五行而下皆禹所自言也馬融云從五行以下至六極洛書文也小劉以為龜文止二十字則與馬融之説同唐孔氏推明孔安國之説以為禹因而第之以成九𩔖自初一曰等二十七字為禹所加其敬用農用等一十八字大劉及顧氏以為龜背先有緫三十八字劉歆則以自初一至六極一章緫為洛書之文諸説孰是曰衆言殽亂折諸聖以經文詳之謂之洛出書則必有書矣謂之天乃錫禹洪範九疇則必有九疇錫之矣如朱氏之説則洛書止有其數而無其文則經何以言錫九疇今以洛書之數按之五居數之中固可知其皇極矣然天一陽數居於下知其為水可也何以知其為五行地二隂數居於西南何以知其為五事天三陽數居於東何以知其為八政乎意其必有文盡如馬融所謂從五行至六極𩔖見於各數之下而禹乃從而𩔖之歟至若大劉顧氏以敬用農用為洛書之文劉歆以自初一曰已下緫為洛書之文則又未免尊信太過而渉於附㑹矣唐孔氏所謂天語簡要不應丁寜囘折如是也曰河圖何以知其為八卦也曰河圖之為八卦固可以方位隂陽竒偶之數而推也如一與六居北則是天一生水地六成之而水位之所居可以知其為坎矣而坎以一陽居二隂之中二與七同居於南則是地二生火天七成之火位之所居而可以知其為離而離以一隂居二陽之中以至三與八居於東而為巽四與九居於西而為兑皆可以隂陽竒偶而推蓋八卦皆造化之定數而九疇則以人事參之其數雖同而其事固不同也曰然則圖書之事果有他物可以證乎曰是不待逺求顧氏未之思耳夫鳥獸之羽毛草木之英華文章燦然條理秩然豈待人刻畫而後爾哉亦造化之所自成耳此猶曰是形有種𩔖也至若文石之中固有山川草木鳥獸之形又豈人力所筆而後成哉天地之間有此理則有此象如魯仲子生而有文在於手秦之仆石起而有文漢之蟲食栁葉而成文古今此𩔖非一世俗之震死者背上徃徃有篆書以述其罪道家多能辨之又筲箕仙親冩為詩詞以言禍福皆耳目所親接者况聖人出而天不愛道圖書呈祥圖之與書其體一也既能有圖亦能有書又何異耶蘇氏曰圖書之文必粗有八卦九疇之象數以發伏羲與禹之智豈可謂無哉上魏青龍二年張液出石有若麟鳯牛虎人馬於其若八卦列宿孛珪者唐子西曰此與河圖洛書又何以異乎惜時無伏羲神禹故莫能通曉其義朱氏曰天地間惟有一理自兩儀奠位其理己彰大極於無外小極於無内即事即物莫非是理之流行發見但其事物之常見者聖人不假之以設教若河圖洛書乃聖明在上和氣所感鍾為祥瑞即是理之徴驗顯見已可以開發人心故聖人因神物之至著者以垂法後世若其理則未有圖書以前固無時無處而不存邵子所謂畫前元有易程子所謂無河圖洛書八卦九疇亦須作者是也新安王氏曰易與範其體不同實相為用易者盡天下之變而不可常者也範者立天下之法而不可易者也夫易始於乾坤變為八卦重為六十四其道本於剛柔迭出以趨時適中然言道則詳言政則略如履之制禮豫之作樂散於諸卦未見夫綱領所在故以一定之法著於洪範其端本於五行其用起於五事而終於福極先後本末有序而不可紊有辨而不可雜故易範合而聖人所以為天下者始無餘藴學者所宜深考也易範本於羲禹皆演於商季或問太極判而為隂陽隂陽布而為五行何以言初一曰五行乎曰九疇皆即其用之切於人者言之故自五行説起或問周子無極而太極一語先儒辨論角立如何曰象山以無極為非則以為此非周子之言南軒以為此乃莫之為而為之之意非真言無是皆不欲言無之一字而為此辨也夫天地之造化若人若物其初皆自無而至有有者復歸於無而無者復能有觀人物之生死可見此人之所共知所親覩非有𣺌茫難測之理推而至於天地之初造物之始未有不自無而至有也故詩曰上天之載無聲無臭繫詞曰易有太極即此之謂也但聖人恐人淪於無梏於有故於易之中止明消息盈虗聚㪚盛衰循環不息之理而不言有無夫是之謂易至老氏則專言無釋氏則專言空故儒者并無與空兩字諱之夫老氏知無之為無而不知無者之能有及其既有則不可以無言此其所蔽耳然而始無之理豈可以其出於老氏而諱之耶釋氏知有之必空而不知空者之復有此其所蔽耳然而終空之理豈可以其出於釋氏而諱之耶夫謂之太極則其有已肇矣非有則何所指以為極夫既肇於有則未有之先非無而何其曰無極而太極此理之自然而然者也但聖人不言而周子言之耳何疑之有或問天一生水亦有物之可證乎曰人之一身可以證矣人之貪心動則津生哀心動則淚生愧心動則汗生欲心動則精生方人心寂然不動之時則太極也此心之動則太極動而生陽也心一動而水生則天一生水也蓋神為氣主神動則氣随氣為水母氣聚則水生故呵氣而成潤也五行之相尅也所以相成而五常之徳亦然徳莫大於仁木徳也仁或失於弱故以義斷之義金徳也義或失於剛故以禮節之禮火徳也禮或失於拘故以智通之智水徳也智或失於詐故以信正之此五常之第而五行相尅之體老蘇之説為然金尅木剛勝柔也水尅火柔勝剛也王氏曰水言潤則火燥土溽木敷金歛可知也火言炎則水冽土蒸木温金清可知也水言下火言上則木左金右土中央可知也木言曲直則土圜金方火鋭水平可知也金言從革則木變土化水因火革可知也土言稼穡則水之井洫火之㸑冶木金之為器械可知也所謂木變者何炳之而為火爛之而為土此之謂變所謂土化者何能燥能潤能敷能歛此之謂化水因者何因甘而甘因苦而苦因蒼而蒼因白而白此之謂因火革者何革生以為熟革柔以為剛革剛以為柔此之謂革金亦能化可以圜可以平可以鋭可以曲直然非火革則不能自化故命之曰從革也或問孔氏以皇極為大中諸儒多祖其説晦菴祖五行志謂皇者君之稱謂人君立極也二説如何曰中道固大而大亦中之體也然謂中為天下之大本則可謂為大中之道則義訓未為稳暢故六經語孟言中多矣而未嘗有大中之説夫以皇極為大中猶可也以皇建有極為大建其極猶可也以皇則受之為大則受之猶可也至於惟皇作極為惟大作極時人斯其惟皇之極為惟大之極則非辭矣故知晦菴取漢志之説為當然不曰帝極王極君極而獨謂之皇極者蓋皇帝之皇亦取大而無際之義人君建極非廣大無外則不可未有狹小而能建極以率天下歸極者也故名曰皇極亦兼大義然下文不曰遵皇之義遵皇之道惟天下皇而皆言王者此又取其合於王者之道而言之蓋皇道之朴略與王道又有間矣或問皇則受之曽氏謂大則受之非小者所能受如何曰皇則受之與上汝則念之正是對而互文或言汝或言皇猶或言于汝極而又言惟皇作極同劉執中曰天地之於物也能生之而莫能終而遂其性也能終而遂其性者聖人也天地之於人也能性之而莫能化而一於善也能化而一於善者聖人也非聖人則不能成天地造化之功非天地則不能成聖人皇極之治其道相參其能相須其力相敵故曰三才也此説為善蘇氏曰正直如以直報怨之直平安無事用正直而已此説善横渠張氏曰隂性凝聚陽性發㪚隂聚之陽必𣪚之其𫝑均敵陽為隂累則相持為雨而降隂為陽得則飄揚為雲而升故雲物班布太虗者隂為風驅除聚而未㪚者也凡隂氣聚陽在内者不得出則奮擊而為雷霆陽在外者不得入則周旋不捨而為風其聚有逺近虗實故風雷有大小暴緩和而散則為霜雪雨露不和而𣪚則為戾氣霾曀隂常𣪚緩受交於陽則風雨調寒暑正劉氏曰一徳正於中則五事治於外一氣正於中則五氣順於時以形而言則各宜𩔖舉聖人觀之所以驗己政之得失也以徳而召則不可以形拘聖人行之所以應天道以淵黙也漢儒於雨不時若則棄徳而修貎暘不時若則捨心而求言其失不已逺乎其惑不已甚乎此聖人所以正皇極於五事之先調元氣於時日之始者為得其本也驗其政教之得失不可以外於形矣求其徴應之本原不可以失乎徳矣此説詳明林氏曰夫堯舜之世則民仁夀非其生而皆仁夀也堯舜之治天下彞倫攸叙休徴時至則不期於仁夀而自仁夀也桀紂之世則民鄙天非其生而皆鄙夭也桀紂之治天下彞倫攸斁咎徴相仍則不期於鄙夭而自鄙夭也故仁夀鄙夭雖本於天而君實制其命旅獒林氏曰以逺物為寳則必有輕賢之心以賢為寳則於逺物弗貴矣虞公以垂棘之璧屈産之乘為寳故視宫之竒若路人齊威王以四臣為寳故視徑寸之珠如糞土人君所寳可不謹哉吕氏曰天下之事才滿則傾惟聖人之心常不足常不已雖到堯舜田地猶有不足之意猶有要做底事一簣未盡之工夫常在非謂止欠一簣做了便了大抵王業雖有成聖人之心未嘗有成也愚按此説雖未必是經之本㫖然聖人之心實然金縢或問孫氏謂爾汝之稱在常人為不敢而周公稱之見父子之間用情也曰按經傳告神之辭多爾汝武成告天地山川曰惟爾有神尚克相予詩祈榖於上帝曰既昭假爾禮記筮辭曰假爾泰筮有常下至離騷九章化神多言余今世祝文亦多言爾神蓋自古而然或者與神相親之意邪若曰父子用情然子之事父曷嘗稱爾汝乎或問我之弗辟馬鄭皆音避陳少南吕才叔推其説以為周公遭謗故居東都以避之至二年成王方知流言為管蔡之罪故言罪人斯得金縢既啟之後成王迎周公以歸管蔡懼而與殷叛故周公再徃東征耳曰豳風諸詩其言與金縢所書皆昭然相合大誥叙言武王崩三監及淮夷叛周公相成王将黜殷作大誥金縢言武王既喪管叔及羣弟流言則流言與叛皆在武王始崩之際不得分為兩節明矣亦非養㓂三年而後始征也少南才叔之意不過謂成王方疑周公周公不應自徃征以重成王之疑故為此説耳不知周公為東伯東諸侯之不軌東伯之職自得專征成王㓜未親政凡事皆聽於師傅二公居中調䕶成王中心雖不能無疑亦未敢明沮周公之行兼成王諒闇於國家之事皆不知一惟冢宰是任在周公固可專其事矣四國之變征之少緩則蔓延莫遏周公豈敢顧一己之小嫌忘宗社之大計邪迨夫三監伏辜遂居東守東伯之職以俟朝命而不敢遽歸此則公之避逺權𫝑以待成王之悟也以經證經正不必如二氏之遷就牽合吕氏曰豳詩皆言周大夫刺朝廷之不知則非獨成王不知周公二公亦不知矣蓋二公非不知但成王方在未敢誚公之時使二公一旦廹之成王從則幸不從則不可繼矣故但涵養其意使之一旦自悟周大夫之刺亦不為過蓋成王未知周公則二公豈得為知周公哉成王知則二公始為知周公矣此君臣一體之義也林氏曰周公作鴟鴞之詩成王猶未信於心然則周公之心非金縢不得而見而金縢之書自二公而下皆不知非天誘其𠂻則成王之疑何時而釋乎成王之疑不釋則國之存亡未可知然文武膺上天之休命其社稷無疆之傳蓋未艾也周公之徳既足以當天意此所以有風雷之變以顯周公之徳而剖成王之疑夫周公之蔵是書以故事而蔵之而非将以為異日自觧之計成王之啟是書以故事欲卜而啟之而非逆知前日周公之舉是皆出於莫之為而為也謂之非天可乎大誥或問三監之叛其執辭非以惡周正将以攻周公也人欲攻已己惡其事而親統師以征之何以釋人之疑且周公何不以東征委太公而已則居朝廷以為内鎭邪曰夫誠貫天地固無顧於小嫌而二公在朝已足以為内助故親徃伐而不敢以艱難遺他人况自陜以東周公主之則征東諸侯固周公之職分也蘇氏晁錯論曰天下無故而發大難之端吾發之吾能收之然後免難於天下事至而循循焉欲去之使它人任其責則天下之禍必集於我晁錯盡忠為漢謀弱諸侯諸侯並起以誅錯為名使錯以身任其危日夜淬厲東向以待之使不至於累其君錯則不然天子自将而己居守故袁盎得以行其説蘇氏之論其亦有合於周公東征之意歟或問十夫十人或以為十亂或以為四國之賢者曰若十亂即周公太公召公實在其中周公不應自言亦不應言十夫必是在下疎逺之賢若良平之於漢房杜之於唐之類但未知必自四國而来也微子之命或問呉氏説微子之命非始封之書如何呉曰勝殷之後立武庚於殷墟殺武庚之後其地與民皆以封康叔時微子己封於宋矣乃即其國封為上公為二王後以續殷祀書之所載蓋如此亦於禮為宜而樂記乃言武王下車投殷後於宋者即封微子也然續殷之後者固已立武庚於故墟矣不知記禮者何所據而言凡䇿命諸侯必有初封之辭如蔡仲之命言乃命諸王邦之蔡之𩔖微子之封於宋蓋在武王時此書乃爵為上公申命之書如孔氏之説則是㣲子前此未封至成王而始封非矣惟史記世家言周公既承王命誅武庚乃命微子啟代殷後使奉其先祀作微子之命以申之其說為是惜其有未盡者既言國於宋又謂殷之餘民既以封康叔而㣲子初未嘗居武庚之地而治殷民也曰呉説是也夫武王且封箕子於朝鮮豈應捨微子不封至成王誅武庚而始封之哉樂記言殷之後者猶曰黄帝之後帝堯之後謂其後裔云耳非必曰為先代後以作賔也史記言殷民愛戴雖不審而言作微子之命以申之則與樂記書叙合矣蘇氏曰武庚叛後命微子微子蓋處可疑之地而命之曰上帝時歆𢎞乃烈祖萬邦作式此三代之事後世所不及也此説是康誥或問呉才叔因朕其弟之言以康誥為武王之書如何曰經言周公洪大誥治則此書為周公以成王命誥明矣雖朕其弟一言可疑如吕氏陳氏之説以意逆志亦無所害若以為武王書則牴牾非一書叙言成王既伐管叔蔡叔以殷餘民封康叔篇内言保殷民夫武王封武庚而以管蔡霍監殷治民不聞以康叔經文及孟子所言最為明白或祖呉説不以聖經明文為據而以旁曲之説為證至不通處則諉以聖經脱簡何異捨康莊而由山徑也曰晦菴楚詞辨證曰古書之誤𩔖多若讀者能虗心静慮徐以求之則邂逅之間或當偶得其實顧乃安於苟且狃於穿鑿牽於援據僅得一説而遽就之便以為是以故不能得其本真而已誤之中或復生誤此邢子才所以獨有日讀誤書之歎實天下之名言也然則此説非乎曰晦菴之言極為至當夫學者觀書安於循襲者未免失於茍同而喜於矯枉者亦未免失於茍異如呉才叔書禆傳專是致疑於前人之説至於聖經所載而無可疑者或併疑之所得處固有之所失處亦不少此晦菴所以有虗心静慮徐以求之或得其實之説而豈以苟異為貴哉呉氏曰先儒多謂康叔尚㓜以此書多稱小子故也康叔武王弟武王九十三而終康叔至此安得尚㓜今陕右之俗凡尊之命卑貴之命賤雖長且老者亦以小子呼之若相親愛之辭疑此所謂小子亦然或問林氏蔡氏論康叔為司宼事如何林曰左傳史記言康叔為周司寇康命之書叙衛侯居第五是猶為司宼故此書多言及刑罰蔡氏曰篇中言徃敷求徃盡乃心終曰徃哉封皆令其之國之辭而未見其留王朝之意詳此篇康叔蓋深於法者異時成王或舉以任司宼而此則未然也曰蔡氏之説是也司宼係天下之命不可兼出侯國以治民化殷係周室之本不可兼入王朝以治獄且古無此明證其必不然如蔡氏之説與經傳亦無牴牾觀君陳之書亦言刑則可見矣或問要囚諸家之説不一曰葉蘇皆以要為獄辭葉氏曰獄成而上其罪法之要辭也則要當作平聲猶今世判結也二音各不同而孔氏謂察其要辭以斷獄則含兩説而要字却從平聲糊糢難辨愚謂經文但云要囚而不云要辭則如今説差稳耳周禮司宼之屬鄉士遂士縣士皆言聽其獄訟異其死刑之罪而要之鄭氏注云要之為其罪法之要辭如今劾矣愚按此説即如今世獄官之擬判結罪也此要亦當從平聲夏氏謂要囚乃要勒拘囚之也然要囚書有四處康誥二多士二若如夏説要勒拘囚之其文固順以之説其他三處要囚則不協蓋夏氏只将要囚二字作連綿字説去恐無所據或問今以由文王作罰刑為非然則文王之刑罰不可用歟曰文王教化已至而猶或有不孝不友者則制為刑罰以警之今殷民桀紂之惡䧟溺至此教化未加不責臣以敷教而遽欲用文王之刑罰以加之而不赦其可乎酒誥穆考晦菴中庸或問曰昭穆之昭舊讀為韶今從本字何也曰昭之為言明也以其南面而向明也其讀為韶先儒以為晉避諱而改之然禮書亦有作佋字者則假借而通用耳曰其為向明何也曰此不可以空言曉也今且假設諸侯之廟以明之蓋周禮建國之神位左宗廟則五廟皆當在公宫之東南其制則孫毓以為外為都宫太祖在北二昭二穆以次而南是也蓋太祖之廟始封之君居之昭之北廟二世之君居之穆之北廟三世之君居之昭之南廟四世之君居之穆之南廟五世之君居之廟皆南向各有門堂寢室而牆宇四周焉太祖之廟百世不遷餘四廟則六世之後每一易世而一遷其遷之也新主祔於其班之南廟南廟之主遷於北廟北廟親盡則遷其主於太廟之西夹室而謂之祧凡廟主在本廟之室中皆東向及其祫於太廟之室中則唯太祖東向自如而為最尊之位羣昭之入乎此者皆列於北牖下而南向羣穆之入乎此者皆列於南牖下而北向南向者取其向明故謂之昭北向者取其深逺故謂之穆蓋羣廟之列則左為昭而右為穆祫祭之位則北為昭而南為穆也曰六世之後二世之主既祧則三世為昭而四世為穆五世為昭而六世為穆乎曰不然也昭常為昭穆常為穆禮家之説有明文矣蓋二世祧則四世遷昭之北廟六世祔昭之南廟矣三世祧則五世遷穆之北廟七世祔穆之南廟矣昭者祔則穆者不遷穆者祔則昭者不動此所以祔必以班尸必以孫而子孫之列亦以為序若武王謂文王為穆考成王稱武王為昭考則自其始祔而已然而春秋傳以管蔡郕霍為文之昭邦晉應韓為武之穆則雖其既逺而猶不易也豈其交錯彼此若是之紛紛哉曰廟之始立也二世昭三世穆四世昭五世穆則固當以左為尊而右為卑矣今乃三世穆而四世昭五世穆而六世昭則是右反為尊而左反為卑矣其可乎曰不然也宗廟之制但以左右為昭穆而不以昭穆為尊卑故五廟同為都宫則昭常在左穆常在右而外不失其序一世自為一廟則昭不見穆穆不見昭而内各全其尊必大祫而㑹於一室然後序其尊卑之次則凡已毁未毁之主又畢陳而無所易唯四時之祫不陳毁廟之主則髙祖有時而在穆其禮未有考焉意或如此則髙之上無昭而特設位於祖之西禰之下無穆而特設位於曽之東也歟曰然則毁廟云者何也曰春秋傳曰壞廟之道易檐可也改塗可也説者以為将納新主示有所加耳非盡撤而悉去之也曰然則天子之廟其制若何曰唐之文祖虞之神宗商之七世三宗其詳今不可考周制猶有可言然而漢儒之記又已有不同矣謂后稷始封文武受命而王故三廟不毁與親廟四而七者諸儒之説也謂三昭三穆與太祖之廟而七文武為宗不在數中者劉歆之説也雖其數之不同然其位置遷次冝亦與諸侯之廟無甚異者但如諸儒之説則武王初有天下之時后稷為太祖而組紺居昭之北廟太王居穆之北廟王季居昭之南廟文王居穆之南廟猶為五廟而己至成王時則組紺祧王季遷而武王祔至康王時則太王祧文王遷而成王祔至昭王時則王季祧武王遷而康王祔自此以上亦皆且為五廟而祧者蔵於太祖之廟至穆王時則文王親盡當祧而以有功當宗故别立一廟於西北而謂之文世室於是成王遷昭王祔而為六廟矣至共王時則武王親盡當祧而亦以有功當宗故别立一廟於東北謂之武世室於是康王遷穆王祔而為七廟矣自是以後則穆之祧者蔵於文世室昭之祧者蔵於武世室而不復蔵於太廟矣如劉歆之説則周自武王克商而増立二廟於二昭二穆之上以祀髙圉亞圉如前逓遷至於懿王而始立文世室於三穆之上至孝王時始立武世室於三昭之上此為少不同耳曰然則諸儒與劉歆之説孰為是曰前代説者多是劉歆愚亦意其或然也曰祖功宗徳之説尚矣而程子獨以為如此則是為子孫者獨擇其先祖而祭之也子亦嘗考之乎曰商之三宗周之世室見於經典皆有明文而功徳有無之實天下後世自有公論若必以此為嫌則秦政之惡夫子議父臣議君而除謚法者不為過矣且程子晚年常論本朝廟制亦謂太祖太宗皆當為百世不遷之廟以此而推則知前説若非記者之誤則或出於一時之言而未必其終身之定論也吕氏曰不湎於酒亦是常事周公推之直至天若元徳人之進徳惟於最難拚捨處放得下即是進徳不已𫉬天順處蓋舉世皆溺於酒在當時最為難捨學者為學須各随分量看自家身上有過惡因循難去者日夜消磨蕩滌氣質使進退遷變方到得天若元徳地位此説善或問劼毖殷獻臣一章説多支離蔡氏説如何蔡氏曰汝當用力劼謹殷之賢臣與鄰邦使之不湎於酒也毖與文王毖庻邦庻士同義殷之賢臣與鄰邦固欲知所謹况於云云可不謹於酒乎曰諸家説劼毖多與酒不相干蔡謂用力戒謹於酒與毖庶邦庶士之毖同極為條達但用力戒謹賢臣宗工使不湎於酒則氣象不然故集傳采林王之説謂劼毖猶殷家畏相之謂則其臣皆自知敬畏而不敢湎酒意味又妥貼也梓材或問荆公謂徳有昏有明自其知不知言之則曰昏曰明晦菴大學註在明明徳亦以心之虗靈知覺為明徳子獨以明徳為徳本明何也曰二君子説明徳大槩皆以智言之夫明徳固本於智然亦非智之一端所能盡若止以智言則所謂仁義禮智皆非明徳乎書所謂先王勤用明徳明徳惟馨克謹明徳左氏傳所稱美哉禹功明徳逺矣豈可獨指以為智言哉蓋徳根於一性本自光明以言其仁則惻𨼆博愛昭然不可蔽而非含糊姑息以為愛也以言其義則是非取舎顯然不可亂而非鶻突苟且以為冝也以言其禮則辭遜節文截然不可紊而非足恭苟遜以為禮也以言其智則洞達瑩徹而非料度臆察以為智也是所謂明徳也至其蔽於物欲則其明徳始昏故惻𨼆博愛之不明則蔽而為殘忍刻剥矣羞惡取舎之不明則蔽而為貪冐無耻矣辭遜節文之不明則蔽而為傲慢驕吝矣是非可否之不明則蔽而為愚懵憒瞀矣是以為昏徳召誥或問應氏説面稽如何應曰天命雖邈無形聲而能面而嚮之叅稽其至順之理終日與之對越周旋所謂顧諟天之明命也天廸其所保若有以提耳而誥詔面稽其所若天威不違顔之咫尺也曰面與諸侯環向面内之面同應氏就面字上提掇頗切固亦無害於理然此𩔖用之時文則為深巧用之説經則意味反薄不如止作面向之渾成講經者所當知也王氏説命哲命吉凶命歴年雖非召公誥戒之本意然不可不知王曰哲者性也吉凶者事也歴年者數也性在我事在物數在時君子修其在我者不責命於天也或問惟恭奉幣用供王能祈天永命諸儒多以為成王将祀於新邑故召公奉以助祭曰召公欲王以敬徳祈天永命以小民受天永命耳若然則是欲以禱祀而祈永命乎洛誥吕氏曰洛都雖有二城而成周則其緫名杜預孔頴達皆以下都為成周謂敬王繼子朝之亂自王城徙都之其説不然大可以包小小不可以色大茍成周信為下都之名則凡書之言洛者皆謂之成周是以下都之名而包王城其不可信一也左氏未嘗有敬王自王城遷成周之明文第言子朝既逐王入於成周而已敬王請城成周之辭亦謂成王合諸侯於成周以為東都則成周者洛都之緫名明矣其不可信二也大事記觧題曰成周乃東都緫名河南成周之王城也洛陽成周之下都也王城非天子時㑹諸侯則虗之下都則保釐大臣所居治事之所周人朝夕受事習見既乆遂獨指以為成周矣或問未定於宗禮亦未克敉公功或以為未定所以尊周公之禮為未能安公之功而留之曰周公之致太平自視欿然豈以成王未尊己之功而欲去能尊己或問林氏少頴曰諸家多以命公後為封伯禽夫必待封伯禽然後留此淺丈夫要君之為豈所以待周公哉康王命畢公保釐東都皆言祗命公以周公之事又言周公克謹厥始君陳克和厥中惟公克成厥終則周公於殷民蓋嘗為之司牧非特營遷之而已書言命公後者蓋成王祀洛之後復都鎬京故命周公留洛以鎮撫殷民若今世留守留後之謂下文廸将其後惟告周公其後作冊命公後皆此之謂也伯禽與太公望相先後報政傳記言之甚詳則伯禽封魯固已乆矣曰考之君陳畢命則周公之留洛鎮撫殷民明矣公曰王命子来承保乃文祖受命民曰伻来毖殷則周公許王留洛以化殷亦明矣夫成王舉祭祀朝諸侯於洛而實都鎬京則其留公鎮洛乃必然之理也史記言太公望封於武王之世又言武王克商封弟叔鮮於管封叔度於蔡封叔旦於魯史記所言縱未可盡信然武成言武王崇徳報功列爵分土則太公之封必當在武王之世孟子言周公相武王誅紂伐奄則周之報功而封建親賢孰有賢於周公者乎又言太公之封於齊周公之封於魯各百里而又併言之則必不應先封太公至遷洛之後始封周公意者周公之封魯已乆而公入為相攝政今公欲退老就國故成王留公於朝不使歸魯而竟命伯禽侯魯歟如此則非獨與魯頌所言王曰叔父建爾元子俾侯於魯之言不相背馳而於林氏要君之疑亦無礙但書所言命公後告周公其後之言措辭不明以為果為留後邪則文義非慤以為果命伯禽耶則何不如其它命封之例明言伯禽乎要之洛誥一書多缺文意其必有舛誤當存之以俟知者多士或問呉氏蔡氏説遷民如何呉氏曰方遷殷民於洛之時成周未作其後王與周公患四方之逺監三監之叛於是始作洛邑欲徙周而居之其曰昔朕来自奄大降爾四國民命我乃明致天罰移爾遐逖比事臣我宗多遜者述遷民之初也曰今朕作大邑於兹洛予惟四方罔攸賔亦惟爾多士攸服奔走臣我多遜者言遷民而後作邑也故洛誥一篇終始皆無欲遷殷民之意惟周公既諾成王留洛之後乃曰伻来毖殷又曰王伻殷乃承叙當時殷民已遷于洛故其言如此蔡曰武王己有都洛之志故周公黜殷之後以殷民反覆難制即遷於洛至是建成周造廬舎定疆埸乃告命與之更始焉由是推之則召誥攻位之庶殷其己遷洛之民歟不然則受都今衛州也洛邑今西京也相去四百里召公安得捨近之友民而役逺之仇民歟書序以為成周既成遷殷頑民者謬矣吾固以為非孔子所作也曰按康誥召誥洛誥皆作於七年三月康誥言惟三月周公初基作新大邑于東國洛召誥言三月乙夘周公朝至于洛則逹觀于新邑營洛誥言予惟乙夘朝至于洛卜宅篇終言周公誕保文武受命惟七年康誥言周公初基東國洛四方民大和㑹侯甸男邦采衛百工播民和見士于周召誥言太保乃以庶殷攻位于洛汭周公命殷庶庶殷丕作竊意殷民之當遷者其丁壮即於此時與四方之民同趨洛赴工而後留居於洛故洛誥有伻来毖殷之語召誥有敢以讎民保受王威徳之語而並無遷民之説多士之叙所謂成周既成遷殷頑民者要其終盡遷之時而論之耳𡊮氏曰召誥所謂庶殷蓋經始洛邑之時所發從役者耳其實遷民在洛邑既成之後所以營洛必調商民者正縁要他親見區處經畫與凢事之利便則其心服而從之也輕不然以久安之民而一旦遷於新邑豈不若盤庚之民怨咨哉昔朕来自奄一章所謂移爾遐逖者東莱謂我明致天罰當移徙爾於遐逖之地今遷於洛乃使爾比我事我臣我也蔡氏以為逺徙於洛夫荒陬僻壤可以言遐逖洛去衛非逺况為土中為帝居烏可以遐逖言乎若以為黜殷之後即遷民於洛非惟無據而周公黜殷在二年之後作洛乃七年之間亦非事𫝑之冝也蔡氏專攻書叙為謬其説若此新安王氏曰周公諸書未嘗以殷民為頑成王命君陳始有無忿疾于頑之語非併以為頑也康王命畢公始有毖殷頑民之説則此叙或出於後之史官故以頑民二字冠於篇首夫殷民不附於周謂之頑可也不忘殷先王之徳眷眷舊王謂之頑可乎故頑之一字周公未嘗出於口也此説亦善無逸東坡曰人莫不好逸欲而所甚好者生也以其所甚好禁其所好庶幾必信然猶有不信者以逸欲為未必害生也漢武帝唐明皇豈無欲者哉而夀如此夫多欲而不享國者皆是也漢武明皇千一而已豈可望哉飲鴆食野葛者必死而曹操獨不死亦可效乎此説善林氏曰宋文帝餞衡陽王使諸子且勿食至㑹所設饌日旰不至有飢色乃謂曰汝曹少長豐逸不知百姓艱苦今使汝曹識有飢苦知節儉耳唐明皇嘗種麥於苑中率太子以下親徃芟之曰此所以薦宗廟不敢不親且欲使汝曹知稼穡艱難耳又曰深山窮谷之民暴露勞苦窮年不休終身不知聲色香味之可好故其夀多至百年其居於都邑者有紛華之可樂嗜欲之可玩故多夭死以是觀之人君之夀豈不本於無逸乎又曰陶侃在廣州無事輙朝運百甓於齋外暮運百甓於齋内曰吾方致力中原過爾優㳺恐不堪事侃之心以一日之逸其害如此人君知此則豈以今日耽樂為可哉皆善新安王氏曰殷二十九君以甲名者六曰太甲小甲在太戊之前曰河亶甲沃甲陽甲在武丁之前又七世有帝甲國語司馬遷帝紀以帝甲為祖甲而孔氏以太甲為祖甲蓋孔氏因國語稱帝甲亂之七世而殞意為帝甲必非周公所稱者又以不義惟王與太甲兹乃不義文相似遂以此祖甲為太甲耳其實不然此書言小人皆謂小民非以為不賢也况先言不義惟王繼言舊為小人語無語次作其即位亦不見太甲復政思庸之意國語説帝甲亂殷又無可見之迹且堯舜之有朱均禹之有太康豈可歸罪於父祖况七世之後乎學者當捨傳記而從經文可也鄭康成之説雖未見其所據要於經文為合耳此説是蔡氏曰不應二人同稱祖甲陳氏曰下文言自殷王中宗及髙宗及祖甲及我周文王及云者因其先後次第之辭也則祖甲之非太甲明矣曰皇極經世厯祖庚之後又譜祖甲起癸亥盡乙未在位三十三年𡊮氏曰周公論三宗無逸但説不敢荒寧不侮鰥寡蓋古人所謂無逸非謂於事為必躬必親只此心致敬便是無逸蓋敬則戰戰兢兢惟恐一毫不到安得去逸樂後世人主如衡石程書皆是君代臣職以此為無逸乃是元首叢脞何異於自縱逸者耶是元首明哉大抵古人之無逸此心之無逸也後世之無逸事為之無逸也君奭或問陳氏吕氏若天棐忱之説陳曰我不敢自以為知天命如何蓋嘗曰其求信於休歟若天輔我以誠歟其終出於不祥歟吕氏曰我不敢謂求信於天惟順天庶乎輔我之誠曰陳説句讀雖順然上天輔忱乃必然之理若以輔忱為不可知則是後世誣天之説也豈其然乎上文既曰我不敢知則是一心不敢必乎天而惟知順天耳若以為順天庶乎輔我之忱亦恐未免必乎天兼添了庶幾輔我之意不如惟順上天輔誠之理為瑩潔也吕氏曰大弗克恭上下是不能嗣前人恭徳也遏佚前人光是不能繼前人明徳也亦通書之文詳畧互相備於殷言純佑命王人罔不秉徳故文王止言亦惟純佑秉徳文王言時昭廸見冐聞故武王言昭惟冐稱徳吕氏曰大臣之位百責所萃震撼擊撞欲其鎮定辛甘燥濕欲其調齊槃錯紛結欲其觧紓黮闇汙濁欲其茹納自非曠度洪量未嘗無翩然捨去之意所以欲其猷裕也又曰周公勉召公以敬夫召公所謂不存者豈若常人然哉亦毫釐之間耳惟周公能見而治之微有不寛随以猷裕開之微有不存随以克敬歛之開歛於眇忽将形之際以洙泗爐錘之妙而用於豐鎬鼎鉉之間也多方或問嗚呼王若曰吕王二説如何吕曰此篇始言周公曰王若曰比先嗚呼而後王若曰書無此體蓋周公處聖人之變故史官𤼵新例以著周公實未嘗稱王所以别嫌明㣲謹萬世之防也紂新安王氏以嗚呼屬之上文其説曰周公不詳言之惡又終以嗟嘆若有所傷痛不忍言也曰二説皆有味但以文勢觀之俱未為順妥若謂史官欲明君臣之分則篇首以周公曰加於王若曰之上已足見矣不待以嗚呼為發語之始亦未嘗以嗚呼為語辭之終也或曰錯簡又未知果然也姑併存之吕氏曰周公知天未絶紂可也何所見而熊數其年蓋我之未忍民之未厭即天也民由之而不知聖人與天為一動静乆速極於明著故數其年而謂之五此武王所獨知説者乃牽合嵗月以附其數亦末矣此説是林氏曰此所謂五年正猶武成所謂九年也武成之九年意者文王未崩之前九年蓋亦以紂之惡可伐而不忍伐之故大統未集也此五年意者武王未克紂之前五年蓋亦以紂之罪惡為可伐而猶冀其改過故須暇之也由是觀之周之伐殷豈得已而不己哉晉武帝以孫皓滛暴有問罪之志其臣羊祜則曰孫皓暴虐已甚於今可不戰而克若皓不幸而没呉人更立令主雖有百萬之衆長江未可窺也王濬則曰孫皓荒滛宜速征伐一旦皓死更立賢主則强敵也此言正春秋時晉伯宗所謂後之人或者将敬奉徳義以事神人而申固其命若之何待之也蓋其意以區區之仁義不足以易吾之大計也晉武帝之心則惟恐呉之有賢王而我不得逞其欲武王之心則惟恐紂之不改過人之度量相逺一至於此不觀晉武無以知武王之為至徳也爾曷不忱裕于爾多方或説與葉説亦通或曰忱信則順理而裕險詐則拂理而廹因葉曰四國叛則多方為之繹騷四國定則多方之休息則多方之裕在四國也陳氏説惟狂克念作聖之説亦善陳曰孔子曰惟上智與下愚不移而周公乃曰聖可作狂狂可作聖孔子所言言聖狂之成也成則不可移周公所言言聖狂之分也聖狂之生於一念之頃故可改孔子雖曰不移實有可移之理但下愚者自暴自棄不肯移耳若肯移即是惟狂克念者也或曰聖狂之分亦有其事乎曰太甲初年欲敗度縱敗禮可謂狂矣至居憂悔過終造廸哲則狂而克念至於通明者也唐明皇初政清明亦庶幾乎通矣晚年蠱惑至於亂亡則通明罔念而作狂者也三山陳氏曰以周室天下之大視商遺民不啻泰山壓卵舉不服之民而誅戮之以一天下之心宜不為過而成王周公諄諄於口舌間不能自己何也是足以見古人忠厚之心矣古之聖人不忍有疾圖天下之心寧使吾有遺力而不忍盡其力於天下寧使吾有餘威而不忍盡其威於天下堯不以四凶之害而遂用操切之政舜不以有苗之逆命用擣其巢穴之師聖人寛緩和柔之政養天下於海涵春育之中曽不以小不如意而遂至於為逞志之舉也秦漢之後吁亦薄矣三山陳氏曰純一也天之不與夏者純一而不變古者無道之國天或降之災異未遽至於喪亡者蓋天之不畀未純猶有待其改悔之意若夫天之不畀至於純一則無一毫佑順之意矣天之佑商必曰純佑命天不畀夏必曰不畀純則純者極至之辭也立政或問三宅之説何紛紛也曰蘇氏以為乃事乃牧乃準一篇之中所謂三宅者參差不齊然大要不出是三者此言極當但蘇説事牧準則未安也曰首章王左右常伯常任準人諸説不同孔説何如孔曰常所掌事謂三公常所任事謂六卿準人平法謂士官與綴衣虎賁皆左右近臣宜得其人曰孔説大槩得矣但以準人為士官則是士師之屬恐非在王左右亦非職之尊者也曰蘇説如何蘇曰王左右有牧民之長曰常伯有任事之公卿曰常任有守法之有司曰準人曰蘇既以常任為公卿矣然公卿之上王之左右豈復有所謂牧民之長乎曰林夏釋蘇説曰州各有伯伯即州牧也當時芮伯彤伯皆以公卿兼牧是常伯亦王左右也曰芮伯彤伯誠為州伯矣然既入為王朝之六卿則所職者卿之事經中初無兼領州伯之據其為東西二伯者乃召公畢公而非芮伯彤伯也安得因一伯字遂轉以為常伯乎至於以準人為守法之有司亦未稳夫守法有司職之微者也安得稱三宅又安得在王左右乎曰孔以常任為六卿而又以準人為士官唐孔氏準人為獄官而子乃更六卿為衆卿而準人則以為司㓂之屬又何也曰此書後面專以獄事為言則知準人為軍法之官明矣但孔既以常任為六卿則司㓂已在其中故遷準人為士官以避其重出耳然士官乃司宼之屬職之小者也以為三事則未安唐孔氏改為獄官是也然於上文六卿又未免有重故子於此大槩祖二孔之説而損益之庶不礙耳曰王説如何王曰常伯庶官之長所謂在位者也常任任事之臣所謂在職者也準人非伯非任而君取之以為準平者也曰王説大槩鶻突不明以常伯為庶官之長則是六卿也然常任又以為任事之人未知於六卿之外所指何官以君所準者為人亦難以定其為何職也孫氏常伯常任同王説準人則同孔説葉氏以常伯為六卿以常任為小宰之𩔖固不待論矣準人則以為師氏之𩔖蓋其意與王氏同然君之所準固在公卿乃捨之何歟張氏以準為公孤蓋亦推王氏之意耳然公孤職之至尊乃言於三宅之末則不倫矣陳氏常伯常任同蘇氏而準人與孔氏同此其大率然也或問繼自今我其立政立事牧夫準人及越有我周文王立政立事牧夫準人吕氏夏氏皆以立政立事為一句以牧夫準人為一句謂三宅畧舉其二以互相備如前言常事司牧而不及準惟有司之牧夫而不及準事也或以為下文言繼自今立政其勿以憸人又言繼自今立政其惟克用常人則知諸家以立政為一句而以立事屬三宅二説如何曰此書多錯綜互舉不及全文其於勿用憸人克用常人止言立政而不言立事者又舉政以見事耳吕夏之説文𫝑稳順諸家之説三宅雖備要未妥也周官或問書叙吕説如何吕氏曰内修外攘治之序也而成王黜商命滅淮夷乃始歸豐作周官何也境内之宼同室之鬭者也苟不先治其鬭室可得而治乎武庚三監之叛近在肘腋實與王室安危而淮夷亦聲勢相倚二患既除海内清晏然後創制立法之事可興固治之序也曰周禮六官之首皆曰惟王建國體國經野乃立某官以為民極則宅洛之後官制已行雖淮夷再亂而朝廷之六官何害於自舉其職豈待淮夷既滅而後官制可行邪蓋成王慮外憂患既平内治或至玩弛故撮舉周禮建官之大㫖敬飭羣臣使各盡其職故作周官之書非至此始行官制也或問王氏謂公論道而孤𢎞化公燮理隂陽而孤寅亮天地林氏謂其鑿如何曰荆公穿鑿固多至其的確處不可例以為鑿而棄之林氏多闢王氏其䟽暢條達處誠佳然懲創之過率畧處間亦不免此𩔖是也不可不知三山陳氏曰周之六卿乃三公兼顧命曰乃同召太保奭芮伯彤伯畢公衛侯毛公是召公領冡宰畢公領司馬毛公領司空矣惟周公位冡宰正百工是以公兼卿也春秋有宰周公是以卿而兼公也自是而後不知古人建官之意漢以太尉為三公太尉武官也又其後以司徒司馬司空為三公此諸侯三卿也名實俱舛矣或問擾兆民不載吕説何也吕曰教民而謂之擾蓋馴習而熟之之謂也撫摩而入之之謂也涵養而寛之之謂也詳味擾之一字司徒之教思過半矣曰舜典言敬敷五教在寛言施教在以寛以施教之術而言也若冡宰言統百官均四海宗伯言治神人和上下皆以效言吕説乃敷教在寛之意自其所施而言故造語雖精恐非經意或問詰姦慝刑暴亂乃夏氏吕氏林氏之説而子取為己説何也夏曰姦詐慝惡乃暴亂之未著者暴虐為亂乃姦慝之己著者故姦慝特窮詰切責而已暴亂則加之刑焉加吕曰姦慝隐而難知故謂之詰暴虐顯而易見直之刑而已天下之罪惡雖萬状要不出此两間也林曰姦慝言詰暴亂言刑駁文也曰三説皆是而意有未全夏氏辨姦慝暴亂之相為本末是矣然謂姦慝詰而不刑則不可吕氏辨詰與刑精矣然失互見之義則詰者似為未必刑刑者似為未必詰林氏言駁文固得互見之意然不辨姦慝暴亂之所以殊又未免儱侗而無别得此失彼故不得不以己意言之此𩔖多不盡載自舜命契為司徒以敷五教王制司空本以量地置邑度地居民伯禹為司空亦以禹平水土人得平地而居之也今周官謂司徒掌邦教司空掌邦土皆相合周禮大司徒之職則掌建邦土地之圖與其人民之數其間分田制賦徒役之事居多雖以十二教及鄉三物教民而不詳及於五典養民而後可教猶有可言至於小司徒卿大夫遂大夫等職於地利之事尤詳則司空已無可為者今周禮以為掌邦事而工之事皆在焉先儒因以考工記足之竊意冬官非止於工之一事然其詳不可攷矣或問六年五服一朝與周禮不同何也周禮行人侯服嵗一見甸服二嵗一見男服三嵗一見采服四嵗一見衛服五嵗一見曰周禮所謂侯服嵗一見謂第一嵗一見也甸服二嵗一見謂第二嵗一見也男服三嵗一見謂第三嵗一見也采服四嵗一見謂第四嵗一見也至第五嵗而衛服一見至第六嵗則皆休息正是六年五服一朝也諸儒疑之過耳左傳所載又與周禮不同何也昭十三年晉人将尋盟齊人不可叔向告於齊曰明王之制使諸侯嵗聘以志業間朝以講禮再朝而㑹以示威再㑹而盟以顯昭明曰叔向所言乃諸侯自相㑹盟之禮猶小行人所謂凡諸侯之邦交嵗相問殷相聘世相朝云耳非諸侯朝王之禮也或問諸家多以為業大於功子獨以為功大於業何也曰功業對言之則功大而業小予已即學業農業明之矣獨言之則功與業無異又觀其文意所主如何若曰周家有安民之功有伐商之功然後能成王業漢髙有誅秦之功有蹙項之功然後能成漢業則業固大於功矣今戒卿士功業而功崇以志言業廣以勤言則知人臣能勤勞以廣其職業然後能成輔治之功也新安王氏之説亦佳王曰所成曰功所修曰業功之崇髙必始於立志用志不逺則無由可以髙矣然所修有職所職有事非能一日底於有成也故當勤而不已其業可廣則志與功成矣或問子訓驕為矜肆侈為奢泰何也曰矜以慢於人者言之謂驕矜也肆以縱於己者言之謂驕肆也奢以用物而言之謂奢侈也泰以用意言之謂侈泰也或問恭儉惟徳無載爾偽何以能作徳而不作偽哉曰恭儉者禮之發也本出於吾徳之所固有惟移於物欲故變而為驕侈耳夫恭敬之心人皆有之而豐約撙節之間出於天理之自然亦莫不各有當然之分非由外鑠也惟致知以明之誠意以實之則能自得於心矣然後推心之莊敬而實行其恭非内存驕慢而外為足恭也推此心之節制而實行其儉非内懐奢泰而外為詐儉也是則能作徳而不至作偽矣君陳或問君陳或以為周公之子如何曰陳氏曰周公命康叔曰乃丕顯考文王乃穆考文王成王命蔡仲曰無若爾考之違王命况周公有大勲勞若命其子以繼父事豈無父子之辭以寵之哉或問先儒言君陳為新進如何曰玩成王告戒之辭固可知君陳之謂新進至謂斯時當盡循周公之典慮舊臣微作意則害治體恐未必然蓋君陳之政大體固當法周公然辟以止辟簡修進良與周公時合由以容無或刑人殺人之親已有間矣而謹始和中時世又自不同兼諸老亦不可以作意害治疑之然成王之不命諸老而命君陳蓋以君陳自足當此任耳恐不必過為之説顧命呉氏曰唐虞之際為嗣君者方三年之喪不知其為君三代之時為嗣君者方三年之喪雖知其為君而未嘗正為君之禮春秋之後為嗣君者方三年之喪雖正為君之禮而齊衰之服未嘗一日而輒去也堯之子丹朱舜之子商均禹之子啓方居喪時皆不知其果立與否也三年之喪畢謳歌訟獄者之舜禹而不之朱均之啓而不之益故丹朱商均知其不為君啓知其為君故曰唐虞之嗣君不知其為君也歠粥面深墨即位而哭弔者致辭皆稽顙而不言百官有司聽於冡宰三年而後即位故曰三代之嗣君雖知其為君而未嘗正其為君魯伯禽徐戎之征天子之命也猶要絰而從事晉襄公崤之師社稷之故也猶墨衰而即戎故曰春秋之嗣君雖正其為君而齊衰之服未嘗一日而輒去也君牙或問蘇氏謂昭王南征不復至齊桓乃以問楚是終穆王之世君弑而賊不討今君牙冏命之書皆無哀痛惻怛之語以見周徳之衰何也曰按左氏傳管仲問楚以昭王南征不復楚人對曰南征不復君其問諸水濵杜預註謂昭王廵狩渉漢而溺又言昭王時漢非楚境故楚不服罪吕氏春秋曰昭王将兵征蠻荆渉漢舟壞王隕於漢中辛餘靡振王北濟然則昭王之不復未可便以為楚人之弑也東坡曰方成周時越裳氏来朝曰久矣天之無疾風暴雨也中國其有聖人乎方是時四夷之民莫不戴王然風雨雖天事非人力者亦歸徳於王及其衰也一寒一暑亦惟王之怨是故聖人以民心為存亡一失其心則無動而非怨矣賞則謂之私罰則謂之虐作徳謂之偽不作則謂之謾出令而不信無事而生謗皆王之咎也夏諺曰吾王不逰吾何以休吾王不豫吾何以助逰豫且以為徳豈有風雨寒暑之怨乎此言亦善吕刑林氏曰唐孔氏薛氏以贖為罰刑為辟篇中所言百鍰贖也墨辟至於大辟刑也此蓋欲應序中所言包括一篇之義故分贖刑為二舜典曰金作贖刑與此贖刑何以異而必分之乎殊不知五十八篇序有包括一篇之義者亦有但言大畧者不可槩觀也或問典獄非訖於威諸家多以為戒當時典獄何也曰此一意乃舉古訓以示訓至後章嗟司政典獄而下方是戒當時之臣文意甚明故從孔氏作堯時典獄之臣兼克天徳而作元命亦非當時之臣所能及及穆王所以望其臣語自有别考之餘章可見或問孔氏謂五刑之疑則赦而從罰諸儒所共遵而老泉之論尤近人情老泉曰大罪固有疑今有人或誣以殺人之罪而不能以自明者有誠殺人而官不能折其實者是皆不可以誠殺人之罪坐之由是有减罪之律當死而流使彼為不能自明者邪去死而得流刑已酷矣使彼為誠殺人者邪流而不死刑已寛矣是皆失其實則無辜者多怨僥倖者易免今欲彼不失實則莫若重贖彼罪疑者雖或非辜亦不至殘其支體若其有罪則雖不受刑固已苦於贖金矣今乃取王説何也曰五簡正於五罰不簡謂罪不當於五刑若今世有罪而情理可憫則與之從輕者是也故從恕而用罰非謂疑其無罪而姑罰之也若夫疑獄則疑而不可知者也若為盗而無贓證殺人而無明驗是為疑獄疑則不可知其人為有罪矣不可知其為有罪雖輕罰猶不加况加以重罰乎故今世疑獄雖殺人之罪而不敢遽加以刑蓋不知其為果殺人故也其以為重罪之疑而加以重罰受罰者果何辜哉先王之制必不爾也故曰五刑之疑有赦赦則釋之而已若更有罰何足以為赦新安王氏辨之詳矣且老泉謂或有誣以殺人而不能自明者有誠殺人而官不能折其實者所以必貴於贖且不能自明與不能折其實皆據他人之知者言之耳彼或不能自明官或不能折其實上之人又安能知其為疑哉使果知其為不能自明者邪則是已知其非罪矣非所謂疑也罰烏可加乎果知其為殺人而不能折其實邪則是殺人無可疑特吾未能折其實耳天下之理固未有為其事而果無實者特患聽獄者不能詳推之耳果無實之可折是真可疑者也又烏可復加以罰哉兼諸儒多謂五刑之疑有赦即所謂正于五罰五罰之疑有赦即所謂正於五過經文不應若是重複蓋五刑五罰五過皆所以治之故皆以正言是皆明知其罪之所止者也至於五刑之疑則是不知其為有罪者也則直赦之而已非惟合於人情法意而上下文支派脉絡亦皆曉然矣或曰五刑不簡正于五罰若五刑之疑者既已竟赦之矣則又安得有所謂五罰之疑者哉曰刑不見簡而正之五罰蓋明知其罪不當於刑而罰之也其有罪不當於刑而宜罰者而其所以致此罰罪之由或疑而無證則為五罰之疑亦赦之也或曰罪不當於大辟何不减為宫罪不當於宫何不减為剕乃從罰何邪曰此先王所以制為贖刑以代其傷殘支體之慘而寓其仁以全民生者正在是也漢孔氏亦謂不降相因乃古之制唐孔氏亦謂次刑非所犯故不得降相因如後世减降之律斯言得之矣五辭簡孚正于五刑蓋情罪灼然當刑而不可出脱者也五刑不簡正于五罰如有墨罪於此而不簡欲竟加以墨又似失之重欲捨之則又不可縱蓋有罪而情理可憫所謂不當於刑者也故恕之而從罰如今世之徒罪條目多矣折肢損眼者當徒而刃傷者亦當徒刃傷比之折肢損目其犯之輕重不等矣喻如折肢損目則使之受徒刑而刄傷者則恕而受徒罰刃多而傷深者受徒刑刃少而傷淺者受徒罰是所謂五刑不簡而正于五罰也刃少而傷淺者固當罰然所以刃而傷之者或出於彼廹我而我不得已應之或本無意而偶加之則其情理又輕矣故罰之不服而又正于五過皆是明知其情罪之所止者也疑則不能知其人之為罪也故直赦之蔡氏曰此篇專訓贖刑蓋本舜典金作贖刑之語然舜典所謂贖者官府學校之刑爾若五刑則固未嘗贖也五刑之寛惟處以流鞭扑今穆王贖法雖大辟亦與其贖免也矣漢張敞以討𦍑兵食不繼建為入榖贖罪之法初亦未嘗及夫殺人及盗之罪而蕭望之等猶以為如此則富者得生貧者獨死恐開利路以傷治化曽謂唐虞之世而有是贖法哉蔡氏之説出於晦菴學者所當知要之穆王之贖雖非盡合古制而所贖止及於不簡者非明知其罪而使之贖如張敞之法也文侯之命或問王氏言侵越我土地殘害我人民不載何也曰犬戎殺幽王周室大壞王降而國風豈止侵土地傷人民而已去之則無不包矣費誓秦始皇驅夷狄出塞外此非先王之智力不及始皇蓋先王仁愛兼覆戎夷錯居内地者平時與之相安於無事至其或叛則征之服則撫之不為己甚故不暇犂庭搗穴而逐之也要之政治茍修雖有戎狄不能為患適足以為吾之法家拂士耳政治茍亂雖無夷狄骨肉皆仇讐故斥逐夷狄不足以救秦之亡而後世徒戎之論則又審於自量者也林氏曰戎狄錯居魯之境内淮夷徐奄預武庚之亂驕悍未服周封建諸侯以周公居魯太公居齊此二人親賢之最而分地乃介於戎夷之間去周甚逺則以控扼東夷故也周公留輔周室使其子伯禽受封於魯東夷之心必不利於魯之建國故伯禽始居曲阜而戎夷並興者蓋與之争魯也按史記太公封於營丘夜衣而行黎明至國莱人来伐與之争營丘周家初定未能安集逺方是以與太公争國淮夷徐戎之於曲阜亦猶莱夷之於營丘徐戎淮夷壤地相望有唇齒掎角之勢服則俱服叛則俱叛考常武閟官之詩可見東郊不開魯可謂危矣而伯禽能為戰守之備以待之號令明而賞罰信卒使戎夷逺遁遂以立魯社稷輔成周家磐石之勢可為萬世法故録於帝王誓命之末或問三郊三遂漢孔氏及林氏東莱諸家皆以為東郊受敵故止言三面然不言三鄉三遂而言三郊三遂何也曰夏謂大國緫四面而言之止於三郊三遂耳不必泥東郊不開之説以為有四郊四遂也若指四面而言則天子六鄉亦可以謂之四郊矣此説已詳况東郊不開自指夷戎並興於東邉故東郊儆備其門不敢開非謂其已至東郊兼郊在十里之外若至東郊則已造城下况費在東海郡後為季氏邑必非東郊之地也東郊不開猶漢世烽火通於甘泉而棘門霸上皆屯兵以待之非謂匃奴已至此呉楚七國反閉函谷闗亦非謂其兵已至闗下也或問東坡言費誓言征言築而不言戰蓋妙於用兵如何曰東坡謂伯禽舎東郊而徃搗戎夷之巢穴此乃後世行險之師伯禽規模止為不可勝之䇿蓋王者節制之師也恐未必若此而所以不戰者蓋此誓乃作於治兵之時非如泰誓牧誓臨戰而誓故不言及戰然要之此後不曽及於戰則是亦不戰也但不如林説圓渾耳秦誓或問先儒言王者之澤至文侯之命已竭受之以費誓以法制之在故國者猶可因也受之以秦誓以義理之在人心猶可復也充穆公之心而因伯禽之法帝王何逺之有今不載何也曰伯禽之誓自作於成王之時恐不可謂之法制之在故國義理之在人心無時而不然非待秦誓作而始知其在人心者可復也夫子定書其可以垂教者不問諸侯之事皆録之於帝王之末意思平正自有餘味或曰無垢謂夫子傷平王不能復讐明王道以為若倣伯禽用兵則犬戎可滅效穆公悔過則聽言用賢王道可興此論甚髙不取何也曰伯禽之用兵穆公之悔過将為百王法豈特平王可用而專為平王設哉如前説則無垢之意已在其中如無垢之意則夫子定書之意似狹而其味反薄也或以為夫子繼周百世可知必知秦之有天下故終秦誓此則其牽強不必辯也或問責人無難數語諸家皆以為穆公語而子以為古人之言何也曰上文之言古人曰下文言我心分别甚明兼又文順而意暢若摷以為穆公之語非惟強自分截文意亦齟齬也或問民訖自若是先儒多以為民情不美如何曰孔説理自正當若以為民情不美非惟殺風景亦豈可以為羣言之首或曰由一人與一人之慶多以為穆公自其身而言如何曰此公上文兩節之意極明古者稱一人哀公誄孔子稱一人子貢病之穆公决不敢為此犯分之語况語意與上文不相接乎書集傳或問卷下
