body:
  text: 書集傳或問目録書類卷上堯典舜典大禹謨臯陶謨益稷禹貢冀州兖州徐州揚州荆州豫州雍州甘誓五子之歌胤征湯誓仲虺之誥湯誥伊訓太甲咸有一德盤庚卷下説命泰誓牧誓武成洪範旅獒金縢大誥微子之命康誥酒誥梓材召誥洛誥多士無逸君奭多方立政周官君陳顧命君牙吕刑費誓秦誓臣等謹案尚書集傳或問二卷宋陳大猷撰大猷東陽人登紹定二年進士官至六部架閣宋史無傳藝文志亦不載其名自序稱既集書傳復因同志問難記其去取曲折以成此編則此編本因集傳而作然集傳惟葉氏菉竹堂書目載之後不復見則明季已佚矣存者獨此二卷耳其書采托羣言反復辨駁雖朱蔡二家之説亦無所遷就可謂卓然自立者至其過執已見掊擊前人如謂堯典非虞書之類殊嫌臆説而生當南宋之季西北山川皆所未睹塞垣以外尤屬影響傳聞故禹貢河源之類踈舛亦多然不以一眚廢也同時又有都昌陳大猷著書傳會通其人乃陳澔之父受學於雙峰饒魯者世或誤稱為一人非也乾隆三十九年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b5d1b1cee19aeddb59e2cff137bb55dd506b5a9043286574cd7a5e184b4b53a6
