body:
  text: 書集傳或問卷上宋陳大猷撰大猷既集書傳復因同志問難記其去取曲折以為或問其有諸家駁難已盡及所説不載於集傳而亦不可遺者併附見之以備遺忘然率意極言無復涵蓄辨論前輩有犯僭妄因自訟於篇首云陳大猷謹書堯典或問堯舜禹湯先儒或以為名或以為諡何也曰陳氏謂觀師錫帝曰虞舜曰格汝舜曰來禹咨禹曰棄曰臯陶曰咨垂曰咨益例以名命之則舜禹當為名舜禹為名則堯亦名也檀弓曰死諡周道也至周而後有諡唯論語曰豫小子履履為名則湯非名矣説者又謂湯名天乙改為履此則不可知或問堯典孔程二説如何孔氏曰典常也言堯可為百代常行之道程氏曰典則也上古因時為治未有法度典則至堯立政有則制事有典曰孔氏專言常則不及可法之義專言道則不及政事可法之旨程專言法度非惟不及可法之義然言法而不及道未免舉小而遺大曰典訓常又訓法一字二訓可乎曰一字數訓者多矣惟其能常是以可法惟其可法是以能常曰夏氏謂以堯舜之事載之典籍故為堯典舜典先儒亦取此説如何曰文籍所以謂之典籍者以其籍可為常法故以典名之而非典即籍也猶六經謂之經者以其書可為萬世之經故以經名之而非謂經即書也如此典籍則百篇皆典籍也豈獨堯舜之書為典哉或問堯典為虞書闕疑何也曰孔氏以堯典為虞史所追録故謂之虞書按左氏傳引舜典大禹謨皆云夏書舜典亦載舜陟方乃死竊意舜典禹謨乃夏史所追録故夫子未正之先止謂之夏書舜典為夏書則堯典為虞書明矣今舜典禹謨之為虞書則是夫子所正也夫子既正舜典禹謨為虞書安得不正堯典為唐書乎夫一代之書必當題一代之名班固作前漢史於後漢時止謂之前漢史未嘗題為後漢史也陳夀作三國志於晉時止謂之三國志未嘗題為晉志也況夫子斷自堯典以為百篇之首豈應獨仍其舊而不正其名哉意必有舛文也或謂堯典舜典禹謨皆謂之虞書以見三聖守一道夫三聖守一道豈以是見哉此則不必辨或問呂氏謂二典如易之乾坤何哉曰乾坤二卦天地之道備矣其餘六十二卦皆乾坤卦內之事件耳二典之書為君為治之道備矣其餘諸書皆二典之事件耳明道謂詩之二南如易之乾坤亦以其包括一經之義而冠一經之首也或問聰明諸家説如何曰諸説不出兩塗泥於字面者則以為耳無不聞目無不見説其字而不及其意豈堯舜之外他人皆聾聵乎放於義意者則以為洞逹無方説其意而不及其字則聰明何以即視聽而言乎蓋聰明乃譬喻智慧之辭古人立辭如此者極多如防間本末苖裔綱紀等字皆是假物以譬事唐孔氏兼此二義其説確當曰既然矣子復注其説何也曰唐孔氏但言聖人之智慧而不及智慧之極則神智洞徹無所不聞無所不見之説又所以補孔氏之未至也其他附注多此類後不盡載或問若稽古帝堯程説如何程曰曰者謂堯典之辭也史氏紀前世之事曰稽古之帝堯其事云云曰書當以古文為正劉説為善然程説亦非諸家所及或問東萊謂敬乃百聖相傳第一字其義何如而人之於敬若何而用力邪曰心之精神是謂聖蓋心者神明之宗也所以具萬理靈萬物應萬事是為斯道之統會也故天地廣矣而此心包乎天地鬼神幽矣而此心通乎鬼神八極至藐此心倐然而可遊萬里至逺此心俄然而可到斂之不盈握舒之彌六合不疾而速不行而至此天下之至神也然出入無時莫知其鄉操之則存舍之則亡心不在焉泰華聳前而目不見雷霆震後而耳不聞不火而熱不氷而寒須臾有間天壤易位孰主其主而宰其宰哉亦曰敬而已敬者心法也即文王所謂宅心也即孟子所謂存其心求放心也即楊子雲所謂存神而神不外也即程子所謂主一無適心常在腔子裏也即上蔡所謂常惺惺法也即和靖所謂此心收斂不容一物也靜亦靜動亦動無內無外無將無迎其處也泰然其立也卓然其豁也洞然其止也凝然其照也湛然一塵不留萬境呈露由是而誠意正心由是而修身齊家治國平天下而聖學之功用可全矣然學者非不知心之當敬敬之當務也然心每未能純乎敬者由知敬之為敬而不知所以為敬則憚其難而莫適其安者皆是也蓋宅心即是敬非以敬而宅其心也存心即是敬非以敬而存其心也存神即是敬非以敬而存其神也以敬律心則敬與心為二物交戰而不相入而心反病矣是添却一重公案也是有事而復正也是積磨鏡之藥於鏡而反以病鏡也梏而不舒物而不化而此心已非本然之心矣尚足以為敬乎相去一毛間千山復萬山此只做得縛手縛腳苦澀生受底敬不做得穆穆肅雍從容自在底敬劉子曰敬在養神夫不曰以敬養神而曰敬在養神者謂存養此心之神自作主宰不使昏散走作此即是敬不在他求也劉子之言所以為論敬之要也歟貴乎熟之而已養得神後胸中灑落如光風霽月融泄如淑景初春天君自然清整百體自然理順豈不是穆穆肅雍從容自在的敬必循此而實用其力然後有以體此而實識其味苟徒空言無益於得也或問安安先取王説王氏曰理之可安者聖人安而行之後乃取陳説何也曰安安乃承上文欽明文思而言朱氏語録謂安安乃重疊字蓋以上四者出於自然而然不思而得不勉而中故言安安以極狀其安行之妙非有一毫之勉強也王氏雖説得兩安字然上言理之可安者則是於欽明文思之外别言理而下安字其味又未免失之薄也或問孔氏以能訓克以至訓格而子所釋不同何也曰凡訓詁以一字訓一字多得其近似未必皆究其全欲人自以意體會耳克本訓能又訓勝惟其勝之故能之晦菴亦以為克難訓能然能字不如克字有力故曰實能勝其事之謂克格于上帝感格幽明皆極其至之意大學格物晦菴以為窮至其極處故曰極其至之謂格如熙字訓廣訓興訓明必包此三意而後熙字意味方全故曰興廣光明之謂熙如懋字訓詁止訓勉吳氏謂懋不必皆訓勉如時懋乃功哉豫懋乃德皆有豐盛之意故曰勉而茂之謂懋俊字訓大訓敏故荆公以為大而敏之謂俊此類後多不載或問格于上下林氏際天蟠地之説如何曰際天則但與天相際而無峻極于天之意蟠地則但深入而又未兼廣博之意也或問克明峻德諸家多以為堯自德如何曰上文言欽明光被已載堯之明德不應於此又言伊川東萊舉中庸九經之序尊賢在親親之先可謂有據兼經言俊乂俊民俊有德並是賢俊之德俊之為義非所以名聖人之德也曰然則大學言帝典曰克明峻德皆自明也非歟曰經傳所引經文姑借以發明己意非必盡與出處本意相合如於緝熙敬止詩之本旨止字即訓助語而大學乃以為知止之止禮記中此類極多固難相律此俊字止訓大亦豈所以名聖德哉或問九族兼二説何也曰孔氏髙祖元孫之説正矣然角弓頍辨之詩刺幽王不能親睦九族曰兄弟婚姻無胥逺矣豈伊異人兄弟甥舅則知兄弟者父族也婚姻甥舅母妻族也周官六行兼孝友睦姻晏子言使吾父族無不乘馬者母族無不足衣食者妻族無凍餒者秦漢間説三族亦指父母妻族為言則孔氏之説似失之狹歐陽夏侯父族四母族三妻族二之説廣矣然不本於司出髙曽以為重似失之泛二説並存可也然歐夏之説父族四則以父五屬之內一也以父之女昆弟己之女昆弟及己之女適人者及其女之子居其四焉抑不知諸女已在父屬之內了雖曰有服紀之可言未免失之支離以意度之則父族四者恐只是親與從及再從三從兄弟叔伯如此則與今世之五服孔氏所謂同出髙曽之説一同母族三者則母之父族母族及母之姊妹族也妻族二則妻之父族母族也或以髙曽祖曽孫非己之所及見而病孔氏之説則其陋不待辨矣夫髙曽謂已所同出之𣲖下耳至元孫曽孫則又以已為髙曽此即今五服之制古所謂小宗五世則遷者也豈必以己之所盡見哉吳氏之説雖經無明文然亦不可不知吳氏曰九族者數之極凡王者於袒免之親同姓之國皆所當親也或問百姓之為百官族姓何也曰唐孔氏謂左傳云天子建德因生以賜姓謂建立有德以為公卿因其所生之地而賜之以為姓令其收斂親族自為宗主按史記黃帝二十五子得姓者十四人上古必德位尊顯者始得姓故百姓多指百官其後人皆有姓故百姓多指民然亦觀其所指如何孔氏以此百姓為百官者非特下言黎民不可重復然經言俊民用章五服以章有德與夫明明在下庶明勵翼皆是指臣而言若以平章昭明為庶民之事則非辭矣曰上既以明俊德為用賢而此復言平章百姓非重復乎曰克明俊德是舉未用之賢兼在下者言之也平章百姓是正已用之官即在朝者言之也正如中庸言尊賢親親而繼以敬大臣體羣臣耳所謂正百官以正朝廷者也荆公曰親九族之道賢不肖能鄙有不辨也則無事乎平不責以事不程其功則無事乎章亦善平章百姓一語足以槩盡舜典咨四嶽而下半篇之義率百官若帝之初一句足以槩舜典即位一節之義林少頴謂聖人之言約言之雖一語不為寡詳言之雖百言不為贅此後世能言之士所以莫能加也或問羲和諸家以為氏夏氏以胤征言羲和湎淫以為羲和乃官名何也曰羲和蓋始以氏居官而後世因以名官亦猶伶氏掌樂而善後世遂以樂官為伶官也或問晦菴謂古字宅度通用宅嵎夷之類恐只是去四方度其日景以作厯耳如唐時尚使人去四方觀星此説如何曰此即蘇氏之説然既職在厯象又宅於四極則所謂度日景之類不言可知王肅之説已包之矣亦猶林氏以賔出日餞納日為候昏旦驗晷刻以作厯也然彼説可以包此意而此説不可以包彼意也或問㿩谷諸家皆祖孔説子獨取王説何也孔曰㿩明也日出於谷而天下明曰按洪範雨㿩相對王氏以日出為㿩當矣唐孔氏推孔説謂隂暗而陽明故以㿩為明而不言所據字書中㿩字亦不訓明蓋孔對昧谷而言故以㿩訓明要不如王説之正或問孔氏言中星與林氏異如何曰考論中星當以林説為是林曰鳥火虛昴皆是分至之昏見於南方直正午之中星而孔氏以為七星異見不以為中星故唐孔氏云仲春之月日在奎婁入於酉地則初昏之時井鬼在午柳星張在已翼軫在辰仲夏之月日在東井而入於辛地則初昏之時角亢在午氐房在已箕尾在辰仲秋之月日在角而入於酉地則初昏之時斗牛在午女虛危在已室壁在辰仲冬之月日在斗入於申酉地則初昏之時奎婁在午胃昴在已畢觜參在辰信如孔説則是鳥火虛昴掌分至之昏皆見於己非正午也何以為四方中星哉王肅覺其非遂謂宅嵎夷孟月也日中日永宵中仲月也鳥火虛昴季月也此説並與天象偶合然分孟仲季非書之意蓋二孔王肅皆不知厯家有歲差之法以月令日在某宿而求之所以不合按厯家自北齊向子信始首知歲差之法以古厯指之凡八十餘年差一度月令日在某宿比之堯時則已差矣以日會月在某宿未知中星宜其不合矣故唐一行云月在虛一則星火星昴皆以仲月昏中而沈存中亦云堯典日短星昴今乃日短星東壁以是知歲差之法乃厯家之所通知特先儒未之思耳蔡氏曰古厯簡易未立差法但隨時占候修改以與天合至東晉虞喜始以天為天以嵗為嵗乃立差以追其變約以五十年退一度何承天以為太過乃倍其年而又反不及至隋劉焯取二家中數七十五年為近之亦未為精密也或問厥民夷蘇氏謂農事至秋稍緩老弱可以漸休故曰夷程子謂秋成民獲卒歲之樂而心力平夷子從程説而刪去民獲卒歲之樂一語何也曰二説皆善但蘇則主民力而言程則主民心而言除去民獲卒歲之樂一語則語意圎而無不包矣此類後不盡載或問諸家所言分至晝夜刻數不同何邪曰唐孔氏謂馬融云古制刻漏晝夜百刻晝長六十刻夜短四十刻夜長六十刻晝短四十刻晝中五十刻夜中亦五十刻融之言此據日之出沒為説天之晝夜以日之出沒為分人之晝夜以昏明為限日未出前二刻半為明日入後二刻半為昏損夜五刻以禆晝則晝多於夜復五刻古今厯術與太史所候皆云夏至晝六十五刻夜三十五刻冬至晝四十五刻夜五十五刻春秋分晝亦多夜五刻此不易之法也然按今厯日分至晝夜刻數則與馬融之言同意亦以日之出入分晝夜歟或問諸家皆以歲一周為期孔氏曰匝四氣曰期一歲十二月三百六十日除小月六為六日一歲有餘十二日未盈三歲足得一月則置閏諸家皆祖孔氏説而子謂期三百六十六日以為指兩冬至而言何所據乎曰此出洪範以百中經考之每兩歲冬至相去必有三百六十六日二十四氣皆然不然則有三百六十五日有竒中間有閏無閏皆然此其可考之明據也如諸家之説一歲三百五十四日每日行天一度則是反欠周天卜一度四分度之一是欠十二日也謂日行天度不盡而有餘剩之度則可何以謂之餘十二日乎三年欠天度三十三度四分度之三是以閏一月使日行天度所欠之數而猶有餘分也愚之言欠與傳言餘其意一同但餘字不分曉兼諸家之説於期三百有六旬有六日一句文義未順也或問象恭滔天為衍文何也曰林氏謂蘇氏以滔天為滅天理則與下文滔天為二義孔説與下文義同矣然謂洪水際天滔滔可也象恭云滔天其義不通故齊唐謂誤此二字而晦菴以為衍文也或問林氏祖史記以瞽瞍為真無目而病孔説何也曰孔説恐必有據若果無目則何以能肆其頑惡所謂祇載見瞽瞍夔夔齋栗瞍亦何自見之而允若邪或問曽氏説釐降謂舜於二女嫡庶之分理之使有辨帝女之貴下之使不驕如何曰釐者凡事理之使皆當然也降者使降心下意以相從也非止正嫡庶去其驕而已或問王氏以釐降為下嫁李氏以欽若為堯戒女晦菴兼取其説如何曰林氏謂此説亦通但如此説則一篇所載惟及堯之妻舜而不及乎舜此説是也曰呂氏説嬪虞之事不載何也呂曰以頑嚚之親少有不到則貽其怒以天子之女少有不盡則貽其不足一則至親在前一則至貴在後左右皆陷穽事父母則妻子之間必有不盡安妻子則父母之間必有不足此人之至難處處曰此但説得舜自身中所處之事未説得舜能使二女亦會處此事也故移注于我其試哉之下注嬪于虞之下則未盡也舜典或問厯試諸説如何曰東萊之説至矣陳氏及新安王氏之説雖未免以後世事體論聖人亦不可不知陳曰吉人爵人於朝猶曰與衆共之况舉天下而授之匹夫不求先有以服天下之心安得天下之無異哉王曰厯試之後德業彰著天下心服則授之者公而居之者安或問三山陳氏勳華之説如何陳曰堯謂之勳舜謂之華皆即其可見者言之也曰林少頴謂舜言華堯言光此説已善堯居帝位成功為大故先言放勳舜方登庸未有功可言故不言勳而先言華也或問左氏傳髙辛氏有才子八人天下謂之八元舜臣堯舉八元布五教于四方內平外成髙陽氏有才子八人天下謂之八凱舜臣堯舉八凱使主后土以揆百事此事當在厯試之時而書以為舜自為之何也曰堯以五典百揆之事試舜而舜能舉賢以為之則亦無異於舜之自為也或問史記載烈風雷雨弗迷如何史記謂山林川澤暴風雷雨舜行弗迷蘇氏因之以為洪水為患堯使舜入山林相視雷雨大至衆皆失常而舜不迷其度量有絶人者林氏曰史記言涉於妄怪自慎徽五典以下皆是試舜之事則納于大麓亦是試之則試之時安知天之必有烈風雷雨而視其迷與不迷者乎吳才老曰天欲顯舜則當使風伯清塵雨師灑道休光景星上下相應何至為烈風雷雨使其狼狽僅至不迷而后顯異之人且將以舜為得罪於天矣要之必是如孟子所説主祭之事但世代久逺不知大麓為何地耳或問孔氏以在璣衡為審已當天心與否如何曰林氏謂厯試諸事已足以驗天人之並與矣使其不當天心不符人望則不授之而已既已受終文祖乃始審天心使七政有失度則將奈何古人授受之義不然也此説是此後有去取昭然可見者不復盡辨或問七政諸説如何三山陳氏曰日月五星在天之政也唐孔氏曰言吉凶各有異政得失由於君之政也所王氏曰以人之所取正也葉氏曰七者以正四時作萬事也曰陳説葉説主天而言政唐孔説王説主人而言政然主人而言要不若主天而言但葉謂正四時作萬事則不然日月五星所以成歲功豈止正四時而已不若陳説為當然猶未明故推其意而足之曰人有政耳天豈有政乎曰此但譬喻之辭猶曰五星謂之五緯星豈有緯乎以其變動異於經星故謂之緯北斗謂之天樞天豈有樞乎以其持造化之綱故謂之樞日月五星司天之政亦猶人之有政也故以政言之耳唐孔氏説亦微有意故附見之或問日月星之所以光者何如曰凡氣之積英者必有光日月星蓋精氣之上浮者也且人之目亦然日月者隂陽之精氣也五星者五行之精氣也張衡靈憲曰星也者體生於地精成於天列居錯峙各有攸屬或問渾天之説如何曰王蕃渾天説曰天之形狀似鳥卵天包地外猶卵之裹黃圎如彈丸故曰渾天言其形體渾渾然也其術以為天半覆地上半在地下其天居地上見有一百八十二度半強地下亦然晦菴曰天實渾淪之氣其行度本不可知但星宿分為度限每宿各有度數合為三百六十五度四分度之一北極出地上三十六度南極入地下亦三十六度而嵩髙正當天之中極南五十五度當嵩髙之上又其南十二度為夏至之日道又其南二十四度為春秋分之日道又其南二十四度為冬至之日道南下去地三十一度而已是夏至日道北去極六十七度春秋分去極九十一度冬至去極一百一十五度南北極持其兩端天與日月星斜而回轉此其大率也陳祥道曰天繞地而轉一晝一夜適周一匝又超一度天左旋日月違天而右轉日一日行天一度月一日行天十二度強天之旋如磨之左轉日月如蟻行磨上而右轉磨轉疾而蟻行遲故日月為天所牽轉至於日沒日出非日之行而天運於地外而日隨之出沒也朱氏楚辭注曰天積氣耳形圎如彈丸朝夜運轉其中乃樞軸不動之處其運轉者亦無形質但如徑風旋轉無窮是為天體而實非有體也地則氣之渣滓聚成形質者但以其束於徑風旋轉之中故兀然浮空久而不墜黃帝問於岐伯曰地何慿乎岐伯曰大氣舉之亦謂此也其曰九天其圜九重則自地之外氣之旋轉益逺益大益清益剛究陽之數而至於九則無復有涯矣河南邵氏曰或問天何依曰依乎地地何附曰附乎天天地何所依附曰自相依附天依形地依氣其形也有涯其氣也無涯或問六宗諸家多取張髦之説新安王氏曰洛誥言禋於文王武王則宗伯亦可言禋川孫氏曰類上帝祀天神也禋六宗享人鬼也望山祭地祇也王氏曰天子事七廟於地不言大示於人不言太祖於天不言日月星辰以地示人鬼之及六宗山川則天地之及日月星辰可知也以天帝之及上帝則人鬼地示之及太祖大示亦可知也於天則舉尊以見卑於人於地則舉卑以見尊林氏蘇氏取孔氏之説林曰七世之廟自太祖而下謂之六宗則不可古者祖有功宗有德必有德者始宗之如啇之三宗是也若以三昭三穆為六宗則七世之非宗古無是理也蘇曰受終之初既有事於文祖其勢必及於餘廟豈有獨祭太祖於齊七政之前而祭餘廟於類帝之後乎如何曰林氏以昭穆不可言宗夫祖宗專言而分别之則有功德之辨泛言之則自祖而上皆可謂之祖宗如大宗小宗皆稱宗祖廟則稱宗廟器則稱宗彛豈必有德然後始謂之宗乎以三昭三穆為六宗於義亦通蘇氏謂受終祭太祖而不及六宗類帝之后祭六宗而不及太祖以是為疑夫謂受終祭太祖則并告六宗可知後祭六宗則并祭太祖可知蓋先後互見耳蘇氏不疑類帝而不及地示謂可以類推於文祖六宗疑之何也曰若是則受終與禋為兩祭宗廟不幾於瀆乎曰先是受終後是告攝或是二事亦猶今士大夫前是受差除告廟後是交割廟祭亦何嫌乎此二論皆未足以病張髦之説要之以昭穆為六宗終是經無明據而孔氏之説有合於祭法及家語故以孔氏為主而附以張説焉或問漢儒六天之説謂天皇大帝又有五帝及五行精氣之神夫土無二王尊無二上二猶不可况於六乎曰趙伯循曰禘必及五帝者五帝功多遂為五方之主即月令其神太皡炎帝黃帝少皡顓帝是也以其功髙故厯代肇於四郊祀之次於天也或問禘上帝不言地示何也曰蘇氏曰凡祀上帝必及地示春秋書不郊猶三望書曰庚戌柴望大告武成柴祀天也望祀山川也而禮成於一日祀山川而不及地理必不然是知祀天必及地詩曰昊天有成命郊祀天地也漢以來學者考之而不詳而世主或出其私意五畤祭帝汾隂祀后土王莽始合祭天地世祖以來或合或否唐明帝始下詔合祀以至於今學者疑焉不知祀天必及地蓋舜以來即然矣或問程説曰覲四嶽羣牧如何程曰既月則四方諸侯至矣逺近不同來有先後故日月見之非如常朝期會於一日也曰四嶽在朝之大臣羣牧不過十餘人所以日覲者非止為其來之不齊蓋數朝見以圖政也林氏非唐孔氏正新君之説甚善附見於此林曰唐孔氏謂五瑞斂而還之若言舜親付之改為舜臣與之正新君之始此説固善然謂之正始則可謂之正新君之始則不可孟子言舜相堯二十有八載天無二日民無二王使舜正名為新君將何以處堯乎孔氏此説蓋進於孟子所謂齊東野人之語也或問五禮孔氏以為吉凶賔軍嘉之五禮諸儒多從之今從程説何也曰陳少南推程説曰修五等諸侯之秩序故以贄定其差非謂修五禮而又修五玊也愚按五禮依程説則於下文義順如孔説非惟下文斷續而於諸侯事亦不甚相切夫既定諸侯五等之禮則吉凶軍賔嘉之五禮皆在其中而變禮易樂改制度易服色之事皆可推矣或問五玉孔程諸家皆謂即五等諸侯所執之瑞而新安王氏則以五玊為贄而與五器共為一物何也曰以理推之不應以所執之瑞而為贄新安王氏辨據已詳按周禮大宗伯及小行人言五瑞則曰元圭信圭躬圭榖璧蒲璧而大宗伯言以玊作六器則曰蒼璧黃琮青圭赤璋白琥元璜與小行人所言六幣圭璋璧琮琥璜同注云六幣所以享也則五器非五瑞眀矣或問羣后四朝孔云各朝方嶽之下凡四處故曰四朝何如曰林氏曰諸侯各朝方嶽上文肆覲東后如岱禮如初如西禮已備言矣不應於此又言信如此説則是諸侯惟朝天子於方嶽而未嘗朝京師也必無是理曰四朝為四年一朝固然矣然三説不同何也曰葉氏謂侯綏要荒各年一朝四年而周是一歲朝一服之侯也夫聖人詳內略外要荒之君政事尚從疏濶豈與侯綏之諸侯均責其四歲一朝乎周官止言六年五服一朝而不及於四服記言四塞世告至正為此也孫氏謂甸服之君朝夕見焉故無朝覲之禮夫唐虞甸服不以封至侯服始有采謂甸服之有君已不合矣至謂侯服一年一朝則是侯服四年之間四朝也以綏服二年一朝則是四年兩朝也要服三年一朝則不及四年而朝也惟荒服為四年一朝耳概之四朝之數皆不合兼荒要必無四年一朝之理曰然則鄭氏所謂其間四年四方諸侯來朝於京師其詳可得聞歟曰此固不可強為之説或是一年朝一方之諸侯如巡狩之分四方亦未可知而要荒恐未必與也此當闕疑曰孔氏謂堯舜同道舜攝如此則堯可知曰舜攝位之政凡三事定巡狩朝覲之禮肇十二州封域之制正刑流赦贖之法以後二事參之疑巡狩朝覲亦有所參定也或問王氏説封山川則材木不可勝用濬川則穀米不可勝食張氏推其説以為此王道之始正合孟子之言如何曰合孔陳二説已善肇州封山濬川皆疆理地𫝑之事故連言之王説乃虞衡之職不應言於肇州之後兼如王説則是盡禁天下之山而非止於名山濬川亦止説得興利一邉若以為王道之始何不及分田制産之事乎或問子既從吳説以五刑非肉刑則典刑果何刑乎曰自漢文除肉刑至今日自死刑之外所用止笞杖竊意唐虞之制亦猶是歟曰林氏説肆赦謂未獲者縱之已獲者赦之如何曰縱謂釋其身赦謂除其罪縱者必赦赦而後縱故連言之非謂已獲與未獲也永嘉鄭氏雖以典刑為肉刑然大意條逹附見於此鄭曰古有肉刑非聖人忍於殺戮也民習乎重不可遽輕者𫝑也時雍之世刑措不用舜始制為輕典以飬其自愛重犯法之心為五刑以宥其大者為鞭為撲以待其小者猶以為未也又為贖為赦以恕具法之可疑情之可矜者肉刑蓋將無用矣而不敢廢也象以示民使之知所避耳所謂畫象而民不犯者歟或問蘇氏謂四凶之罪莫得其詳林氏謂四凶之惡其始見用於堯其終見罪於舜皆自為之堯舜豈容心哉葉氏謂三苖見於經者凡三呂刑謂遏絶苖民在命羲和之先此所竄竄在禹治水之前大禹謨征苖在禹攝政之始舜典分北三苖意其在禹徂征之後歟蓋世濟其惡非一人也林氏謂説者以洪範言鯀則殛死遂以殛為殺非也使其當殺直肆諸市朝足矣何必於羽山所謂殛死正如後世史傳言貶死也當從本傳所言數説皆善林氏曰書所載於名分之際最嚴蓋懼其涉於疑似以起後世異同之論也如舜之居攝疑其稱帝故於命禹稱舜曰以見前此未嘗稱帝也周公攝政疑其稱王故於多方言周公曰王若曰以見周公雖攝而號令皆成王之命也而後世猶有謂舜南靣而立堯率諸侯北面而朝之周公負黼扆以朝諸侯於明堂者蓋妄説也唐孔氏謂舜本以百揆攝位今既即位故求置其官此説是也蓋舜雖受禪其實居百揆之官但攝行天子之政耳而堯之位自若也堯崩畢喪然後告廟即位方訪四嶽求其為百揆者以代己之位則是舜居百揆餘三十年然後禹代之蓋名分之際其嚴如此也愚按此説有補於名教既載其要於集傳又附其詳如此三山陳氏説眀目逹聰雖前輩所己言然文意眀暢因附於此陳曰唐虞之世下情未嘗不通而舜猶及此者蓋即位之初天下之急務莫急於此雖其情未嘗不通舜亦不恃其遽通而忘之也以舜之聰明四目四聰必非有加乎舜也舜之意若曰吾自恃其聰明而使夫人不得以盡其情則門庭萬里天下之利害休戚豈一人所能周知今退然處於無所聞見之地使凡有聞見者咸造焉則天下休戚利害可以灼見不出户而知天下坐於室而見四海者用此道也古之治天下者莫不以是為要道蓋天下猶一身也關節脈理必欲其無壅一節不通則身受其病矣是知下情之通塞乃治亂存亡之所由判也或問明四目逹四聰諸家謂舜不自視用四方之視以為視舜不自聽用四方之聽以為聽如何曰此説雖髙而未免於過夫釋經者但當順經文以明正意不及者則有欠説之病若本淺而鑿之以為深本近而迂之以為逺此衍説之病夫明四目逹四聰不過謂使四方之聞見皆無壅於上耳推其本原固出於帝舜不自用其聰明之所致然遽謂舜不自視聽用四方之視聽以為視聽揆之經文則本無此意乃抗而過之者也其意反差釋者此病多矣或問奮庸熙帝之載諸家多從孔氏以庸為功以載為事如何曰下文亮采已為事矣既言奮功而熙事不應重言亮采兼奮功而始及熙事熙事而始及於明事亦失其序如今説則文義安順無上所云之病林氏謂百揆職重以奮庸熙載為有已試之效者將用為百揆亮采惠疇乃未試之效其於伯禹作司空及汝平水土之語皆相協此説亦通但有能二字不順耳或問葉氏朱氏説伯禹作司空如何朱曰使禹以司空行百揆之事汝平水土是司空之職惟時懋哉又勉百揆之事葉曰猶周以六卿攝三公事也曰此説文義雖順但禹平水土在舜徴庸之初八年而水土平舜自攝位至此已三十餘年謂禹以司空兼百揆固無害然以為復使之平水土則不然或問五典蘇氏從左傳以為父義母慈兄友弟恭子孝如何曰林氏謂中庸論天下之逹道五曰君臣也父子也兄弟也夫婦也朋友之交也人倫盡於此五者敷五教於人而君臣之義夫婦之别朋友之信豈有忽而不教者哉當以孟子之説為正曰孔氏以敷訓布而子謂敷者宣而布之何也曰敷有敷宣敷布二義宣謂闡明之布謂班行之兼此二義方能敷教曰蘇氏謂教民必寬而後可亟則以德為怨否則相率而為偽此説如何曰此説亦可互相發明若更添亟則拘迫不能有成之意則尤善也曰教亦多術矣豈專在於寬哉曰教人者易以欲速而受教者難以速成易於欲速則忿疾厭倦之所自生難於速成則齟齬扞格之所自起故夫子言誨人不倦必世後仁皆是貴寬之意既以敬為主則所以教之者無不至特慮其失之迫耳故言在寬曰寬則得無縱弛之患乎曰主於敬而行之以寬自不至縱弛也曰子採呂氏之説謂為含洪廣大漸漬涵養辭不幾於贅乎曰含洪廣大以度量之寬言之漸漬涵養以時日之寬言之意義方全也或問惟明克允夏氏謂惟明則能原情定罪得其允當文義為順今取孫説何也曰用刑者非但取其明而已蓋徒明則過於察而流於苛故悉其聰明必致其忠愛如得其情則哀矜勿喜故知孫説為善或問蘇林氏言兵刑非一官何如蘇曰唐虞以德禮治天下雖有蠻夷寇賊時犯其法然未嘗命將命師特使臯陶以五刑五流之法治之足矣兵既不用度其軍政必寓於農民當是時訓農治兵之官如十二牧司徒司空之流當兼領其事是以不復立司馬也或者因謂堯時士與司馬為一官誤矣夫以將帥之任而兼之於理官無時而可也林曰夫蠻夷侵亂邉境不用兵執之則何以𨽻於臯陶之刑如其用兵以士官為將帥古無是理舜之時安知其無大司馬堯官偶不及之耳曰兵乃刑之大者唐虞以德化天下士官之設已非得己隆古之時兵既不常用但領之於士官兵刑合為一官所以見聖人不求詳如此蓋仁天下之深意也蘇林疑其説者以士師不可為將帥耳夫為將者非必盡是掌兵之官如今之兵部樞密皆掌兵而未嘗為將意者唐虞平時兵政止以士官兼領如今世之制故征苖自屬之大禹而不以命臯陶也夫工虞之微且列於九官使其果有司馬豈應置而不言乎夫唐虞兵刑之官合為一而禮樂分為二成周禮樂之官合為一而兵刑分為二蓋帝者之世詳於化而略於政王者之世詳於政而略於化此世變升降之異也或問無垢張氏説若豫工謂因萬物自然之理而為之制作復改張説何也曰無垢所言雖善乃聖智創物之事非百工之事也不若張説為當或問林氏説虞官正合孟子之言不載何也林曰孟子言不違農時榖不可勝食也數罟不入汙池魚鱉不可勝食也斧斤以時入山林材木不可勝用也榖與魚鱉不可勝食材木不可勝用是使民養生喪死無憾也王道之始也舜既使稷播百榖又求掌山澤之官誠足國之本也曰孟子所言乃為治之初將以厚民耳其曰不可勝用者乃為民而殖物也帝舜所言乃成治之後推以愛物耳其曰若草木鳥獸者蓋代天而理物也氣象固不侔矣然舜之言足以包孟子之意孟子之言則不可包舜之意也或問直而溫下四句荆公言此教者之事諸家多取之如何曰晦菴謂如此説則於教胄子上都無益愚謂直寬剛簡決非施教者之事王張氏雖強引經據於理終非所安也或問蘇氏謂九官舜有不問而命者臣有受而不遜者皆隨其實如何曰古者君臣皆以位為憂而不以位為樂其所以遜者非姑為禮文而虛遜亦非謂不足當而遜也蓋其謹重不忽之誠意發見自不容己東萊謂晉王述見時人多遜官以要譽乃不遜而受以矯虛遜之弊要之虛遜固非述亦未為見理者也述誠不識所謂誠實之遜蘇氏謂隨其實而不遜正東萊論王述之意而不問而命不遜而受乃後世直情徑行者殆非唐虞敬謹之氣象也王孫氏之説己當或問夏氏言九官自稷契而下皆舊有職任夔典樂已久故以擊石拊石百獸率舞答舜如何曰若然則稷契等何為無答辭乎舜方命以職而遽自述其功似無此理亦非史氏敘事之體以上下文考之其為益稷篇錯簡衍出無疑或問舜繼堯不應遽廢羲和之職舜典止及四牧九官羲和職兼天人反不與何邪曰典謨皆彼此互見舜在璿璣玊衡則命羲和可知且九官十二牧堯時豈應無然略不及者以舜典見之也然則堯典不載九官十二牧舜典不載羲和皆互見耳三山陳氏説陟方亦善堯曰殂落舜曰陟方書悉記之乃春秋書公薨路寢之意人情以死為諱而不知君子以是為能謹其終故曽子啓手足而知免其斯以為順受其正歟或問子多闕疑何取於明經乎曰孔子談經於三代之末尚以及史闕文為幸孟子言書於戰國之時猶以盡信書為難況書經秦灰漢壁之餘傳於耋翁幼女之口孔安國自謂以所聞伏生之書定其可知者其餘錯亂磨滅不可復知觀論孟經傳所引不同處不可該舉今學者於千數百年後乃欲以無疑為髙而強通其不可通之説其未安審矣或問子去取諸家之説專以順經文為主而尚簡何也曰傳注之體固如此且詩云天生蒸民有物有則民之秉彛好是懿德孔子曰天生蒸民也有物必有則民之秉彛也故好是懿德只就中添四個字滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足孔子曰清斯濯纓濁斯濯足矣只就中退十字換兩斯字曽不費辭而意味無窮聖人之釋經蓋如此此即傳注之祖也謝顯道謂程明道詩不立訓詁只添一二字點掇他讀過便使人有悟正得孔子説經之體至如中庸言雖有其位苟無其德不敢作禮樂焉雖有其德苟無其位亦不敢作禮樂焉鄭氏注云作禮樂聖人在天子之位人一能之已百之人十能之已千之晦菴注云蓋百倍其功如此之類最佳諸經疏於義理雖未透然順附經文簡而不繁最為得體曺操注孫子杜預注左傳皆不自作文本朝諸儒釋經始自作文然非傳注之體也曰易之彖象文言及乾坤二卦爻辭子曰以下豈非自作文乎曰此所謂十翼蓋自為一書以為之輔至王弼注易始析而附入之非可與蒸民詩滄浪歌之説同論然諸卦彖象亦是順卦辭爻辭以釋義而不辭費也大禹謨或問帝舜申之孔氏謂申重也重美二字如何曰此説謂舜因臯之謨而重美其功因禹之功而重美其謨耳雖舜有汝亦昌言時乃功之語終不若申逹不屈之意為平妥或問三山陳氏説迪吉逆凶如何三山陳氏曰當順道之時反己無愧心廣體胖其吉孰大焉外此而言吉是徼幸於非望之福也當從逆之時十目所視心勞日拙其凶孰甚焉外此而言凶是其為禍可得而逭也曰如此則是非望之福可以捨道而幸得不可逭之禍可以從逆而苟免也抑不知捨道而求福決無得福之理縱或得之乃所以為有道之禍耳從逆而免禍決無可免之理縱或苟免乃所以積惡而滅身耳此正與世俗所論禍福同非聖經之旨也三山陳氏説罔遊罔逸一節亦善曰惟聖君能受盡言不如此者言語必有所遜入而後可又見古人諫君不纎悉於末節惟先正其本原本原既正萬事自得其理或問刑期於無刑莫只是辟以止辟之意否曰辟以止辟則是截然以刑而遏其不犯如齊之以刑民免而無恥者是也刑期無刑則有哀矜惻怛之意在焉氣象蓋不侔矣曰然則成王之説非歟曰才添乃辟二字便有不忍輕用之意其味便不同也或問不矜不伐之説夏與無垢不逮呂説逺矣亦附載何也曰意味雖淺於呂然亦各有一意必備諸説而後經意方全不可盡以一説為限界此類多矣後不盡載或問厯數聖人亦言數乎曰數見易大傳詳矣聖人何嘗不言但不泥此而忽人事如後世符讖耳邵康節之學專主數然其言禍福則以為不由天地只由人故伊川謂數學至康節方有理關子明筮説謂人事兆未然之機卜筮明將然之應則數亦未嘗不係於人事三説皆有理也曰然則三説如何曰孔以厯數為天道意頗包涵吳推孔説專指厯言王專指數言朱大意指數言而以厯為譬喻按易大傳止言數而不及厯堯典止言厯而不及數厯數與數自是兩事或問心之知覺一耳發之於人欲則為人心發之於道義則為道心而所以為心則一如何曰譬猶水火用之於灌溉烹飪則是道心用之於漂蕩延燎則是人心然所以為水火則非有二也譬人之強勇用於為善則為道義之勇用於忿鬭則為血氣之勇然豈有二勇哉但人心之説不如晦菴之全耳曰或謂動而應事者為人心故惟危靜而無為者為道心故惟微如何曰心苟合道動亦道靜亦道也豈特靜者為道而動者非道哉此老莊所謂道非吾儒之道也或問率百官若帝之初若訓如豈不可曰訓順則有奉承之意訓如則輕矣故唐孔氏謂若不得為如舜典言巡狩曰如初者皆不為若則知此若為順也臯陶謨無垢説謨明弼諧文意敷暢亦可發明葉氏之説無垢曰有德之人心地豁然洞見是非成敗如鑑之照形燭之灼物其為謨豈有不明乎心神和粹使人之異意消其繩愆紏繆藹如春風之著物盎如和氣之襲人其弼人豈有不諧乎或問林氏以行而世為天下法言而世為天下則説思永善矣不載何也曰所謂思永者思其終久之善否如何而謹所擇以自修耳世為天下法則但指其善者而言其意不若蘇氏所舉禮記之言全備兼此亦無思義此蓋意似近而未全者也曰既欲世為法則則其致思於善否不言可知曰釋經之體但當依經釋義若轉轉推去固是可通然不免因蓋及車因車及馬之意而終墮於支離之弊不若於蓋説蓋於車説車之為有界則也此類多矣後不盡辨或問龜山言爵人於朝與衆共之刑人於市與衆棄之雖天子不得私故刑賞不言我如何曰刑賞當純乎天故不言我謂因朝市之迹遂不言我則與天又隔一遞後世爵人刑人未嘗不如市朝豈盡合於天哉益稷或問安汝止諸家多作心之所止如何曰言止則心身與凡事皆在其中獨指心則餘其餘矣且無經據或問呂氏説臣作朕股肱耳目謂君臣相須為一體不載何也曰相須為一體則君猶未免自作一半語意未瑩不若馬氏謂君無為而臣有為者之為明淨也或問絺繡鄭讀為黹當矣復附孔説何也曰觀葉説則孔説恐有所據故存之葉曰禮謂絺綌者不入公門自周之文而言則絺非所貴然孔子以純冕儉於麻冕則葛固有精於絲織者矣或問樂之所以為形見感召者如何曰夫天地之間有此理則有此氣有此氣則有此聲猶人之喜則有笑歌之聲怒則有咆哮之聲悲則有愁戚之聲其中寬裕則其聲和其中忿躁則其聲厲故治世之音必安樂猶人之喜而有笑歌之歡也亂世之音必怨怒猶人之怒而有哮吼之戾也理到則氣隨氣隨則聲形皆實理之不能不著而不可得掩者也此所謂形見者也天地之間惟聲音之感人也深聽笑歌之聲則欣然而樂聽悲哭之聲則戚然而哀故嘽諧之聲作而民康樂邪辟之音作而民淫亂是以先王作樂宣播八風導逹和氣陶冶性情移易風俗此所謂感召者也樂之所以可觀治忽者以此也曰然則萬寶常知隋亂者何也曰隋之將亂當時有識之人如牛𢎞房喬皆預知於極盛之時則其實固不可掩於聲樂之間而其聲音之感召又不能無之矣猶人喜而作樂樂固因人而和而人又因樂之和而喜氣愈溢哀而作樂樂固因人而悲而人又因樂之悲而哀思愈增而形見感召更相生矣曰寶常初欲改樂煬帝不用使隋果用寶常之樂亦可以變其聲音之和以延隋之治乎曰使寶常為之固亦不能掩其形見之實而其所感召者要不為無補矣古人修德以為樂之本而又正樂以養德之和未嘗偏廢是則通本末之論也或問林氏言堂下之樂以管為主者貴人氣者如何曰貴者人氣之説固有理然笙亦是人氣而處於後又似未通或問韶樂蘇説如何蘇曰樂之所以不能致氣召物如古者以不得中聲故耳樂不得中聲者器不當律也器不當律則與擲埴鼓盆無異何名樂乎使器能當律則致氣召物雖常人能之蓋見於古今之傳多矣而况於夔乎夫能當一律則衆律皆得衆律皆得則樂之變動猶鬼神也是以格天神格人鬼來鳥獸皆無足疑者曰蘇説固未足以盡韶樂之全而論聲律有理不可不知或問諸儒皆謂舉石以見八音子則專指言石不待衆音而已足以感人物果有是理乎曰古之善樂者以一器而致物者多矣故伯牙鼓琴而六馬仰秣匏巴鼓瑟而流魚出聽史記載師曠鼓琴一鼓再鼓而致風雨之應皆不待他器之奏夔擊石拊石而感百獸固有此理尤見舜德之盛韶樂之美感格之妙如此也禹貢禹獨以貢名篇夏氏之説亦詳夏曰此書首别九州之疆界以詳山水之經歷田賦之髙下終紀朝貢逹帝都之道其事非一然獨以貢名篇者乃禹治水成功之後條陳其九州所有土地所生以為一定之法以告成功於上使下之人按此以為取民之常例所載雖不一實以任土作貢為主故以貢名或問無垢張氏任土之説如何無垢曰不廢其所有不責其所無不強其所難得是謂任土曰文句似善意實不然古人制賦固不責其所無然有而不取者後世尚多有之况古制乎今言不廢其所有則是凡有者一物不遺也不強其所難得是即不責其所無也兼止及有無則不包輕重多寡之意不如馬説訓詁切而意包也曰新安王説如何曰此説於興地利為切然此任亦包彼任之意要之合二説意味方全故附而足之唐孔氏曰貢賦之法久矣治水之後禹貢定之非禹始為貢也或問孔氏説奠髙山大川為差定祭祀品秩説者多非之夫古人飲食必祭出行則祭道登車則祭軌舜巡狩四嶽首先柴望况禹平水土乃非常之大役而不先祭告可乎曰禹定髙山大川為表識乃其治水之大規模在是其定之之後因而祭告固不可謂之無若以為專為定祀典設則略其大而言其小是禹自無治水規模而徒倚神祐以幸其成也曰舜典巡狩首載柴望非歟曰巡狩而首柴望以見天子承天以臨臣民之意其事與治水不同所以旅山載於梁雍其意蓋可見兼下文已三言旅山不應於篇首又言也或問禹敷土林氏夏氏謂敷土而散之非若鯀之土堙水如何曰禹之治水惟能順其勢以導之使由地中行而豈一一敷散其土而鉏掘之哉朱呂之説不可易矣餘説有當存併附於此吕氏曰李光弼築萬里城不過數日蓋先擺布定各處幾隊聲勢相接故得速成若逐旋理會則散亂參錯矣唐孔氏云左傳云舜舉八凱使主后土則伯益輩佐禹多矣禹必身行九州規模設立乃使佐已之人分布治之孟子言禹三過其門則其餘所歷他處多矣故言分布治之也冀州九州次第林氏之辨亦詳林曰唐孔氏言九州之次以治水為先後水性下流必自下泄之故首冀而終雍蘇氏以為水患河為甚江淮次之河患冀兖為多故禹行自冀始皆未為通論洪水泛濫天下其始必相視水之大勢順地之髙下漸次導之其首尾本末大概相應下文所紀導山導水之序是也此序九州但各記一州之事及其山川所在施功之曲折非謂先一州之水既畢矣更治一州也而朱曰治水固先治下流然下流既疏則上流當踵治勢有不容己者如導河一役既於冀兖導其下流則上流之在雍者必應繼踵施功不應己治其下流姑置上流在後且别治他水也禹貢山川多以孔安國漢志為據林曰禹貢山川地里歷三代春秋至今數千年其間變易不同又川澤下流多所圮壞無復鈎考唐孔氏據孔安國所載而益以漢地里其意謂秦焚詩書圖籍皆在髙祖入關蕭何盡收之孔安國去漢初七十年身為博士承詔作傳必具見圖籍所載山川必得大槩或問林氏言鑿龍門止就淺狹處鑿而廣之何以知其然曰禹貢凡施功處或治或修或績或乂皆隨輕重載之使其果如賈遜之説則他處功用皆不及此之多何以止言載與治而略不及於墮斷之迹邪或問孔氏及蘇王諸儒説衡漳新安王氏以為非如何王曰清漳出并州濁漳出潞州即潞也東至鄴下入清漳鄴相州也清濁二漳合於相而東則為從亦漳出於趙州自趙入清濁二漳則為衡曰漢孔氏去古近蘇王諸儒皆至中原所謂漳者宜親見之新安王氏言漳之源流雖詳恐未必是禹之舊迹兼王乃近世人未嘗身至中原故未敢從或問恆衛大陸逺於帝都故言於田賦之後如何曰朱呂之説已盡若所當治禹豈以其逺而後之哉岷嶓之於梁弱水之於雍豈不逺乎或問孔氏謂大陸之地已可耕作春秋傳魏獻子畋於大陸地説云河東北流過洚水千里至大陸為地腹則皆以大陸為地也爾雅十藪晉有大陸郭璞曰今距鹿北廣阿澤是也杜預謂昭慶縣有大陸澤山海經謂大陸之水皆以大陸為澤也當何從乎曰皆是也謂大陸為地者蓋以陸名地也謂大陸為澤者蓋大陸之傍有澤而因地以名澤也今經言大陸既作則是大陸之地有澤已可耕作而澤則非可以言作矣故當以孔説為當譬如言錢塘既作是錢塘之地可作豈可因錢塘之名而指為江水之作乎或問新安王氏謂北方地寒故服皮南方地緩故服卉何如曰非也此自言各有所出耳北方皮服豈夏亦服之乎南方蕉葛豈冬亦服之乎如吉貝木綿皆南方所出然皆非暑服也夾右碣石新安王氏之説亦可采王氏曰夾右碣石對左言之其在北平者右山也其在遼西者左山也唐志平州石城縣營州栁城縣皆有碣石山平州漢之右北平也營州漢之遼西也或問河入海之道曰新安王氏辨之詳矣王曰禹貢言夾右碣石入於河此禹河之舊也周定王五年河徙已非禹之故道漢元光三年河徙東郡更淫渤海繼決於瓠子又決於魏之館陶遂分為屯氏河大河在西屯河在東二河相並而行元帝永光中又決於清河靈鳴犢口則河水分流入於博州屯河始壅塞不通後二年又決於平原則東入齊入青以逹於海而下流與漯為一王莽時河遂行漯河夫河不行於大伾之北而導於相魏之南則山澤在河之瀕者支川與河相貫者悉皆易位而於禹貢不合故欲辨冀州山川不可不先講求河之故道也兖州或問濟泲之别林氏曰濟字今從水從齊而古文書周禮職方班固地理志皆從水從􅙻按説文從水從􅙻注云兖州之泲其從水從齊字注云出常山房子縣贊皇山則此二字音雖同而義實異後世以從水從齊為兖州之濟其實乃字之訛也當從古文為正或問厥賦貞缺疑何也蘇氏曰貞正也賦隨田髙下此其正也其不相當者非其正也此田中下賦亦中下林氏曰九州之賦相較而為上下之等雍之賦第六兖之賦不應又第六也漢孔氏謂州第九賦正與九州相當州孔氏蓋九州獨無下下之賦此州治水最在後畢為第九成功故賦第九葉氏曰九州之賦無下下賦以薄為正則貞謂下下也曰蘇氏説貞為正善矣然林謂雍兖之賦不應皆第六而九州不應獨無下下之賦則至當但林氏以兖州最後成功於州為第九然州之髙下豈可以成功之後先為定兼厥賦則但系於田之下而不言州則文義亦不順葉氏下下之説固是然謂賦以薄為正豈他州之則皆非其正乎孟子言輕於堯舜者為貉道重於堯舜者為桀道故古人以什一為天下中正豈但取於薄乎皆未免牽強故缺以待知者徐州或問林氏以埴墳為二種如何夏氏曰諸州有二種者必析而言之未嘗併言如厥土白墳海濵廣斥是也如豫之土已别二種言厥土惟壤下土墳壚豈豫之下土又有墳壚二種哉然則埴墳者為埴而墳也或問淮泗與河通之道蘇氏與新安王氏之説如何蘇氏曰自淮入河必道於汴世謂隋煬帝始通汴入泗而疑禹貢之言此考之不詳而已項羽與漢中分天下割鴻溝以西為漢以東為楚文頴注云於滎陽下引河東南為鴻溝以通宋鄭陳蔡曺衛淮泗即今官渡水也魏武與袁紹相持於官渡乃楚漢分裂之處安知非禹迹即禹貢九州之末皆記入河水道而淮泗獨不能入河帝都所在理不應爾意其必開此道以通之其後或為鴻溝或為官渡或為汴然皆引河水而注之淮泗也故王濬伐吳杜預遺之書曰足下當徑取秣陵自江入逾泗汴泝河而上振旅還都以見秦漢魏晉皆有此水道非煬帝創開也由王曰洛入河溢為滎會於菏又注於泗由泗入菏菏入滎由滎而逹河也曰蘇説謂決渠相通也王説謂本氷自相入也要之二者皆隨其所便不可指一廢一且如今之浙江自錢塘入海大江自毗陵入海由浙江逹大江者自浙江入海轉海逹大江亦可也自浙江入裏河轉逹大江亦可也或迂或徑各隨所便要之經既謂之逹則當時必有可逹之道不宜以後世之通塞而疑禹迹之舊也揚州或問林氏謂陽鳥乃地名其地可居非謂雁居也如何曰春秋時鄭地有鳴雁漢有雁門郡近世永嘉有雁蕩山皆因雁而得名意者雁之南翔居於此地故取為名水退而地可居也歟此説亦通然孔呂之説自穩愜或問三江之辨如何班固曰南江從會稽吳縣入海中江從丹陽蕪湖縣東至會稽陽羡入海北江從會稽毗陵縣入海王氏之説亦同陽羡今常州冝興也一江自毗陵一江自吳縣吳縣者即松江也東坡辨之曰固雜取支流小水以應三江之數如使此三者為三江則是與今京口入海之江為四江矣京口視此三者猶畎澮禹道遺其大而數其小何邪韋昭曰松江浙江浦陽江新安王氏辨之曰浙江自杭言之曰錢塘自越言之曰浦陽一江而二名耳昭析一為二并松江為三失之矣郭璞曰岷江浙江松江新安王氏辨之曰璞舉松江浙江之小以匹岷江之大未為當又新安王氏曰江有中北必有南江今江流至蕪湖有支江分於縣南此中江也至於銀林而蘇常二州承此江之下流病於漂沒故其後築堰以窒之是以中江不復東流然則中江之未塞也北江行於毗陵之北中江派於陽羡之南其波之溢羡注於具區而松江出焉愚曰此諸説皆據震澤而求三江也朱氏謂諸儒不明章句訓詁但以下文震澤底定相屬以求三江不知此書當句自為文凡曰既者皆已事之辭非與下文起義夫經於導江導漢皆言自彭蠡出為中江北江耳非指近震澤小水言之也葉氏曰漢至大别南入於江為南江與中江北江而為三吳氏同此説愚曰此説蓋於彭蠡之上下求三江也審爾則共為四江矣兼漢之在大别之上則為南江在彭蠡之下則為北江是一江而為二江也蘇氏曰豫章江入彭蠡而東至海為南江岷江江之經流會彭蠡以入海為中江漢自北入江會彭蠡為北江此三江自彭蠡而下則三江為一過秣陵京口以入於海不復一矣禹貢猶有二江之名曰北曰中以别味也此三水性不相入故川難合而味異故至今有三沴之説唐陸羽知水味三沴相雜而不能欺不可誣也濟入河而溢為滎亦然沴音戾愚曰此説蓋於彭蠡之上而求三江也經謂彭蠡之下為中江北江則不合矣東陽馬氏曰三江不必以别為味但三處江合而為一故以長江為三江也愚曰此説於今日之長江雖合然槩之經文中江北江則不侔矣曽氏曰考於地志豫章之川如彭水鄱水塗水之類凡九水合於湖廣東至彭蠡入江此九水蓋南江水也南江乃江之故迹非禹所道其後禹導漢水入焉與舊江合流而水之派分為南北故漢為北江又其後導岷山之江入焉其流介乎二江之中故為中江北江中注皆禹所導南江乃其故道耳故經不之志程氏曰彭蠡為南江無疑禹之行水嘗經疏導則雖小而見録無所致力則雖大而不書禹嘗大會諸侯於會稽今禹穴尚存又因導山至衡陽是浙江洞庭禹皆嘗經行其視漆沮瀍澗不啻倍蓰而浙江洞庭反不得書者亦以無所記耳南江源派誠大且長正以不經疏導故自彭蠡而上無一山一水得見於經然於其合並江漢而以其匯會名之使天下因鼎錯之實參北中之目而南江隱然在二語之中此聖人得書之體者也愚曰此説比諸家又有理但經無明文未敢以為實新安王氏謂按今大江所行以求三江猶按漢大河以求九河其不可得明矣此言為當或問九州田賦古今髙下不同何也曰禹貢揚州田下下梁州田下中至唐則以江淮為財用淵藪天下號揚一益二以户口之盛故也雍州田上下秦號關中為陸海漢關中地畝直一金至後世則為荒落之墟蓋地力之升降皆由人力之多少也或問孔氏江淮相通之説如何孔曰由江入海由海入淮林氏推其説謂禹時江淮不相通至吳王夫差始通之孟子言排淮泗而注之江誤也曰林孔蓋泥沿之一字故云爾不應遂以孟子為誤今淮南湖港入江者不可勝數後世穿渠通所難通者多矣江淮相近地平如掌轉輸之徑捷溝澮之灌溉歷唐虞三代豈不能穿渠以相通而必待吳王創之乎曰傳謂吳王始通江淮何也曰意者中間或堙塞而吳王復通之亦猶世謂隋煬帝始開汴以通淮河也曰禹貢言淮泗入海而孟子則謂注之江非誤乎曰注者或是相注流通未必謂其盡入江也若如孔説則水道不應如是之迂曲荆州或問九江之辨孔氏曰江於此州分為九道為地里志云江自潯陽分為九東復合大江潯陽記九江一曰烏江次曰蚌江烏白江嘉靡江畎江源江廩江提江菌江曽氏曰沅水漸水元水辰水敘水酉水湘水資水醴水皆合洞庭東入於江是為九江也曽氏曰禹貢導河曰東過洛汭北過洚水蓋洛水洚水入河河則過之而已導漾曰過三澨導渭曰過漆沮蓋大水受小水則謂之過二水相受小大均焉則謂之會江合九江謂之過者蓋其源有九小於江故也如江分為九道則經當曰九江既道不應曰孔殷於道江當曰播為九江不應曰過九江林曰曽氏此説固善然以九水為九江亦無考處要之九江之名與其地相逺不可強通然各自别源而下流併入於江此則可以意曉也或曰洞庭可謂巨浸而禹貢周職方皆不載何也曰或者洞庭禹時未為澤而後世始為澤歟且巢湖亦巨浸據雜説載晉時巢縣始陷為湖然則禹貢之無洞庭亦豈如巢湖之類歟後世舊淵湮塞而平地為湖者往往有之古今遼逺固難齊也或以今世江南山川與禹貢所紀或異遂謂禹迹不及而誤載縱使禹迹果不到其所共事乃八凱九牧之流豈其罔上聖人其載之經以示萬世乎禹貢山川至周職方所紀已不能同唐人謂鑑湖八百里今僅存溝港此何異見今日鑑湖而疑唐人為妄乎髙岸為谷深谷為陵從古所有今日親睹亦多若以聖經為不足據則何書可據邪此則不必辨或問砥貢厥名或謂貢其名見聖人之不忘武不責其實見聖人之不尚武何如曰聖人除戎器以戒不虞奮武衛以安中國四時畋獵不忘習戰豈取其名而廢其實哉既以貢言則是貢其實矣而名安可言貢乎若曰不常貢則當言錫貢矣或問孔氏謂以菁為菹如何曰林氏謂菁即蔓菁處處有之豈必貢於荆新安王氏謂荆去帝都逺雖貢菁豈可為菹邪豫州或問孔氏以菏澤在湖陵如何新安王氏曰湖陵魯地也孟豬在漢睢陽睢陽今宋州也湖陵與睢陽境不相接其水無由自東北而西流以入孟豬定陶今曺州東南至宋州百六十里則菏澤在定陶其水入孟豬無疑雍州或問或以梁之旅平為告成而祭雍之既旅為興役而祭何也曰此書皆所以紀成功耳祭固有告始者矣獨謂之告始則何以紀成功乎故知皆主告成言也觀下文九山刋旅可見梁既言旅平故雍止言既旅其蒙梁旅平之意而互見歟或問林氏以為禹貢所敘九州事為禹别九州自導岍以下為隨山自導弱水以下為濬川自庶土交正以下為任土作貢如何曰書序乃挈一篇之大旨言之非指定其章句而截為品目也導山導水乃因前九州內所説山川源委未盡故申述之若以此為隨山濬川任土作貢則前各州內所説山川貢賦皆非乎或問弱水黑水河水分行之道唐孔之説如何唐孔氏曰黑水出張掖而三危山在燉煌自燉煌而南黑水安能截河而南行蓋河自碣石以西多伏流地下故黑水傳越而南也新安王氏曰非也以地之南北考之弱水出張掖在北自張掖西至流沙河水經積石在金城郡在南自積石北行而東三危在燉煌又在積石之西南故黑水至三危可南入海也或問河源新安王氏曰西漢時積石河關之外地屬羌戎至唐始知河源在吐蕃中故杜佑曰河從吐蕃西南數千里流而東北是為積石之河佑之言略而未詳唐長慶中劉元鼎使吐蕃會盟見河之上流由洪濟梁西南行二千里水益狹春可涉夏秋乃能勝舟其南三百里三山中髙而四下曰紫山古所謂崑崙者也蕃曰悶摩黎山東距長安三千里河源其間流澄而緩下稍合衆流色赤行益逺他水并注則濁河源東北直莫賀延績尾殆五百里隱測其地蓋劍南之西元鼎所經見如此然則河源於紫山東北出於積石蔥嶺在積石之西北紫山在積石之西南鹽澤黃河原不相屬潛行地下之説妄也或問濟河江漢分合之辨如何唐孔氏曰濟水既入河與河流相亂而漢孔氏知截河過者以河濁濟清南出還清故也二蘇氏曽氏以為味别也詳見上三江下林氏曰説皆未為確論夫濟清而河濁濟少而河多以清之少者會濁之多者不數步間則清者己化為濁矣既合流數千里安能自别其清者以溢為滎乎古之人蓋有知水味者惟知其味之合而已淄之味如此澠之味如彼淄澠合則其味又如此三沴亦然苟使淄澠既合為一器而使就一器之中别其半以為之淄别其半以為之澠則雖易牙陸羽亦有所不能矣水合則味合安能以味别而復出哉鄭漁仲謂漢水至大别入江經文止此而已東匯澤而下皆脫文也導沇水至入河經文亦止於此夫經文難曉則缺之可也若以己意增損經文其病又甚矣曰林氏本説自明白簡易見集傳然其闢水味水色亦未為盡夫水之合流兩邉並行而不相雜者有矣非如一器之內攪雜二水而為一也蘇氏謂京口江至金山少北水味殊絶輕重亦異知是不相雜水之相合其流派之在左在右或清或濁亦有可辨處如濟入河漢入江或自一邉流入合流之後復自一邉流出固亦可辨濟河之清濁竊意二孔當親見之林氏南渡後人未必親見也或問晦菴之言如何晦菴曰漢既入江則漢水已終其匯為彭蠡可言也其為北江入海乃導江事也而屬之漢此不可曉曰觀林氏之説則可釋矣或問澧之説如何孔氏曰水名也言鄭氏曰此經導水自弱水以下凡過言會者是水凡言止者或山或澤皆此水也此澧乃陵名即今長沙澧陵也曰據楚詞則澧為水名明矣鄭氏以為言至皆山與澤而水未嘗言至亦有理但經文未嘗有陵字而以為澧陵則牽強矣或是地因澧以得名也如今言至錢塘豈是至錢塘江如言至吳江豈是至江中蓋地因水以名者多矣故兩存之或問庶土交正底慎財賦成賦中邦林氏以為交易折變而輸其賦於中邦且引後世轉漕京師之費以證之如何曰古者賦藏於天下惟王畿之賦則歸天子然猶鄉里有委積豈若後世盡輸天下之賦而納之京師哉此説不惟文義不順若交易折變而輸京乃桑孔之遺智而唐世兩稅貨錢輕重之弊所由生也豈聖人任土作貢之制哉或問三百里納秸服王氏夏氏之説如何王曰正在五百里之中便於畿內移用故使之納秸而服輸將之重所夏曰納秸雖輕於粟米然曰服輸將則足以償其輸之輕矣曰王説秸服二字雖詳然後世郡縣納賦猶是官自漕運三百里去王畿不為近若以為五百里之中而便於畿內移用則是輸將於五百里之間不亦勞民乎此必不然兼服只是服役之義謂之服輸將則是增衍為説於文義亦未當夏因王説而謂服輸將以償其所輸之輕則意愈差當時所以為輕重者必有多寡之等而未必以輸將為償也林氏曰禹錫玄圭以告成於天古者祀天地必用圭玄圭者蓋天色因天事天猶蒼璧然也亦通甘誓或問馬氏以建子建丑建寅為三正如何曰新安王氏辨之己詳王曰蘇氏以為堯舜以前有以子丑為正者有扈不用夏之正朔是也其説不然堯之授時以寅為正月舜因之至商乃以十二月為嵗首至周以十一月為嵗首堯舜之前安有丑正子正者乎使其果為不用正朔亦豈應言三正乎曰夏氏謂董仲舒言舜紹堯改正朔如何曰漢儒多喜言改正朔經內舜禹初無此也或問汝不恭命唐孔氏林氏謂我奉天汝當奉我則此命當作君命也曰凡上無所係而獨言命者如賜不受命之命則是天命也上承君而言則王命也今上言恭行天之罰而下繼言不恭命作天命説尤有味兼天命之命自可兼王命意味今姑以無垢説為主附孔説焉𡊮氏曰未祧之廟其主難以移動遷廟雖已祧興師載其主而行亦所以奉祖宗之命也至於祫祭祧亦與焉只是踈爾漢儒康衡韋元成輩論祧廟皆一切掃除之豈理也哉亦善或問林氏説孥戮林氏曰顔師古注漢書孥戮戮之以為孥也猶囚孥正士之孥正合罪人不孥之意今兼吕説何也曰林説固善但上既言戮於社以指其人之身而又戮為孥𨽻則文意重疊若施於湯誓之孥戮又恐太輕豈軍法而無殺戮之刑乎臨陳軍刑不可與常刑比若戮辱及子誓師亦未害也或問禹言豫荒度土功啓哌哌而泣豫弗子夫啓生於治水之時而益與禹共艱鮮食禹治水在舜攝位之初舜攝位三十年即位五十載而後禹嗣位禹薦益於天七年而後啓嗣位於時啓當八十餘歲乃堯舜禪位之年也而益之年又踰於禹多矣豈不可疑乎曰文王夀九十七方其受命作周已踰八十武王夀九十三克啇二年而崩其時亦九十矣衛武公九十而戒於國穆王享國百年而作呂刑古之聖賢年彌髙德彌邵又適當天下之責固不得辭非可與後世例論而疑其老也五子之歌或問林氏謂太康五弟其二即仲康以五子之賢使其一人守國不出羿雖欲為變而不可乃空國而至洛汭何也曰太康棄國逺逰五子必是諫不從言不聼又不任以國寄五子無所措身故不得已侍母往以望其返非五子有職守而盡出也永嘉趙氏曰桀紂之惡極矣民不忍二諸侯不亟叛以先王德澤在人故也禹之去太康未久未若桀紂之暴而民二國奪諸侯恝然莫有勤王之舉五子在洛亦無有救恤之者何哉蓋唐虞之世愛畏其民不敢少肆而神器之去留一聼於民而不敢為己私有也唐虞之於民若保赤子若臨天威惴惴然惟恐小失其意民久習而安焉一旦乃有逸豫遊畋之君輕棄其民去國弗返豈不甚怪哉譬如孩提之童安於慈愛之父母未嘗有拂意一旦惸然孤立遇不友之兄棄之而不恤則其愁苦啼號而不可禁情之固然非忘其父母之恩是則民之怨太康乃所以思禹之德也大道之行天下為公選賢與能不私其子堯舜不以天下私朱均朱均之不肖固也使朱均賢如臯陶稷契之徒堯舜亦不肯捨聖而授之賢也蓋天下者至公之器傳之賢者至公也天下有聖人焉而捨聖以授賢則亦非公也堯舜之時不以天下私其子亦不以天下私諸臯陶稷契之徒禹遜臯陶哀切懇到而舜命不易循至公之理而已太康亦朱均之類耳啓無堯舜之德不能擇天下之聖賢而授之乃以天下私傳其子而遂至亡國當時四方諸侯環視莫救非厭乎禹德也親見堯舜禹之至公而知禹之心憂諸侯不恤吾民而不憂吾子孫之失天下也使有恤民者起而正之猶前日之揖遜與賢也何擇焉羿之逐太康而立仲康未為有負於禹惟其措心不出於此是以假之而遂歸耳然則傳子之法非乎蓋自時之汙隆言之啓之慮天下至審自大道之行言之則征伐固不若揖遜與子固不若與賢也韓退之曰世益以難理傳之人則爭未前定也傳之子則不爭前定也前定雖不當賢猶可守不前定而不遇賢則爭且亂天之生大聖人不數而生大惡也亦不數傳諸人得大聖然後人莫敢爭傳諸子得大惡然後人受其禍禹之後四百年然後得桀亦四百年然後得湯與伊尹湯與伊尹不可待而傳也與其傳不得聖人而爭且亂孰若傳之子雖不得賢猶可守法蓋堯舜之利民也大夏后氏之慮民也深或問無垢謂聖人於愚夫愚婦猶畏之況有知者乎此言善矣曰聖賢所以畏之者非畏愚夫愚婦蓋畏天理且自畏其心耳安有知愚之别哉苟謂愚者畏之而知者愈加畏則是以畏之輕重在天理而不在人心也其流必至於忽愚而畏知如戰國之賤虐愚民賔飬豪傑以相傾雖與秦之賤士者不同而不知畏天則一耳胤征或問先儒多疑羲和之征如何曰帝王之道莫大於奉天堯作厯象舜作璣衡蓋時以作事事以厚生生民之道於是乎在羲和之征仲康可謂知帝王之家法也矣先儒於此書疑焉者蓋以時日為輕也夫葛伯不祀不過其身自得罪於祖宗而湯以為始征羲和廢時亂日使人君上失奉天之道下失生民之務其罪過於不祀逺矣又況有脅從渠魁之事乎學者不疑湯之征葛而疑胤侯之征羲和者過矣或問仲康之賢既收兵柄以屬胤侯何不竟為太康討賊殺羿顧加兵於羲和何也曰太康之失國若以後世事體言之則兄弟當痛心疾首聲羿之罪於四海以起勤王之師致復讐之義可也觀五子之歌乃無一言咎羿豈五子之賢不若後世忠義之士乎蓋當時風俗習見三聖揖遜與賢之舊一旦太康縱欲失民羿因民不忍距之而援立仲康竊意羿之托公濟私以召號於天下者亦不止於五霸當時之人見其廢昏立明天下之歸心者亦不止於若霍光而已仲康之賢深察其微故收兵柄以屬胤侯然其篡弒之迹未露又退然以兵柄與人雖其包藏不測亦安能違衆而預誅之乎林氏謂相之見弒必是優遊不斷以失其柄故至於此使常如仲康之世羿何自而篡哉此説是矣或問辰弗集於房若非房心之房亦通況月令季秋之月日在房今獨取孔説何也曰堯時中星已與月令不同難指月令為據注見堯典或問於新安王氏曰厯家推步日食朔月食於望一百七十三日有餘而為交然後食此厯法之常也然春秋二百四十二年書日食三十有六隱公三年三月己巳日食至桓公三年七月壬辰朔而又食中間十有二年至莊公十八年又食中間三十二年則當交而不食也至哀公二十一年九月庚戌朔日食十月庚辰朔又食二十四年七月甲子朔日食八月癸巳朔又食則不當交而食也若不當交而食與當交而不食非厯法所能盡推故先王以日食為天災日主陽月主隂月食陽勝隂也日食隂勝陽也鼓孔氏曰周官鼓人曰救日月則詔王鼓夫日食而之以微隂也月食亦伐鼓以救之何也蓋日月著明之象而或食焉則隂邪之氣也故伐鼓以救之不亦可乎二説皆善或問王氏説天吏與孟子合用新安王説何也王氏曰吏奉天罰者也故謂之天吏曰吏誠奉天罰必不至逸德不若新安之説穩猶俗言王師為天兵也或問孔氏以尹為字而子以為名何也曰唐孔氏據孫子及呂氏春秋以尹名摯故以尹為字耳然三代而上未聞有以字傳者至春秋時人始以字傳觀伊尹告太甲自稱尹躬則尹非字明矣曰然則摰非名歟曰人或有兩名者亦有前後更易者此則不可知也湯誓愚曰後世人君之德愈不及古而君之為惡者則愈甚於古故桀之愚過於太康紂之惡過於桀秦二世及六朝昏亂之君過於桀紂永嘉鄭氏説典寶恐近於臆度然其論則甚善因附於此曰胡氏春秋傳曰古者寶玊世守罔敢失墜以昭先祖之德存肅敬之心告終易代宏璧琬琰天球夷玉兊之戈和之弓垂之矢莫不陳列非直為觀美也先王所寶傳及其身全而歸之則可以免矣况神器之大者乎典寶之作其以祖宗之物所當常寶若無德則天亦不可常可不警戒乎仲虺之誥林氏曰湯惟放桀而武王則殺受蓋桀既奔竄南巢故湯縱而不誅以見其不得己之意至紂則異乎此荀子所謂紂卒易向而誅紂蓋武王本無殺紂之意而前徒倒戈紂身死於行陳之間乃殷人殺之耳紂既見殺武王無可奈何故立其子代殷後以寓其惻怛之意是亦湯之意也邵康節謂下放一等則至於殺其意蓋以為湯能容桀而武王不能容紂也失其旨矣此説亦善或問蘇氏以禹服為五服如何曰此説亦可但上既言表正萬邦則文意重矣或問用人惟己諸家多説權不縱於人如何曰此説四字文義雖通然爵人於朝與衆共之國人曰賢然後用之堯之疇咨舜之師錫用人正不要自人主已出也若謂不惑於人則當言任賢勿二可也謂之惟出於己幾何而不啓人君自徇之私乎此章四節每兩句相對若言用人惟出於己上下皆不偶愚之説乃本於孔氏孔曰用人之言若自己出雖惟字作若字説不免牽強然上下文義却俱順比諸説差勝孔氏守訓詁甚嚴惟字本不訓若又恐經文或誤姑存以待知者或謂改過為用人之過夫古人所謂改過過則勿憚改豈為用人發乎此不待辨孔氏説文理俱長但以為用人説則偏矣或問成湯聖人也聖人亦有過乎曰聖人固未嘗有過然常懷改過之心猶堯舜之舍己從人是也兼亦有所謂聖人之過如舜與周公以兄弟之愛而不知管蔡之將叛象之將殺已雖出忠厚之意是亦聖人之過也程子謂顔子之不二過以為使天假之年則將至於化而聖矣孟子謂堯舜性之也湯武反之也觀反之之意則其未造於化之時意其亦有所謂不二之過歟呂氏謂用人惟己如中庸所謂取人以身故改過不可吝似亦牽強或問王氏説推亡固存謂推彼所以亡之故固吾之所以存乃邦之所以昌也如何曰若止説二字自通但上文意義不協林氏兼弱攻昧取亂侮亡其文以輕重為之節弱未至於昧昧未至於亂亂未至於亡而兼攻取侮亦稱其不善之輕重愚曰弱昧亂亡固可分兼攻取侮則不可分矣或曰人之處事不過義利兩塗人之處心不過邪正兩端以義制事則不徇於利以禮制心則不流於邪或曰湯之伐夏救民亦義制事此仲氏釋湯之意亦善或曰人君能自得於所師則天下之善始為我有故可以王如顔子之師夫子心契神會終日不違乃自得師也三千之徒非不皆師聖人然未能方於顔子之自得則與聖人猶二物非所謂自得師也自得師者以其得人之得而為自得之得也林氏曰能自得師謂無所不師也孔子曰三人行必有我師焉此能自得師也或問張氏説謹終之道當先謹始始之不謹克終者鮮矣復引召誥若生子罔不在初生為證如何曰此説於句文甚順但成王幼沖即政召公慮其不能謹始故以謹始為重若成湯取天下德業如此豈不能謹始者仲氏慮其恃功業而驕故欲其謹終如始耳非方戒其謹始也夏氏謂湯之始興非不善所謹者惟在於終而已此説是也湯誥或問蔡氏謂降災意當時必有災異如周語所謂伊洛竭而夏亡之類如何曰言災咎則災異在其中言災異則包括有遺矣或問玄牡唐孔氏謂夏尚黑殷尚白於時未改夏禮故用玄牡諸儒多從之如何曰林氏謂一時用牲不必因色求義如魯頌曰白牡騂剛豈以未變殷禮乎此説自有理但以為偶用玄牡則不如陳説且周人尚赤故取於騂且角矣而祭天則用蒼璧牲幣如其器之色因天事天正可以為眀證陳氏乃以為周禮而别引禹錫玄圭為證則近於泛故以意改之而欲沒其説也曰林氏以上天為天帝神后為后土皇地祇何如曰若以武成言告於皇天后土則林説為善奏告天地亦是理所當然但玄牡説陳氏止云告天故未敢獨用林説然舜典肆類上帝説者謂言天則地祇可知豈祭告上帝而以后土配而牲則獨從重而用天色歟故並存以待知者或問晦菴説賁若草木兆民允殖如何晦菴曰賁若言草木之美允殖言兆民信安其生罪人既黜伏天命既弗差故草木華美百姓豐殖謂人物皆遂曰此説於此二句極順但天命弗僭一句未免與上文重疊取下文又不相串不若夏氏之説上下文意俱順雖曰暴殄天物終不成草木皆不遂發生罪人黜伏而草木華美又似不近情理也曰此説猶所謂山川改觀之意耳曰謂山川改觀則可謂草木亦美則不然曰詩所謂柞棫斯拔松柏斯兊非歟曰詩美周家積纍久物生咸遂爾與此又不同亂世固是草木失性亦有野無青草之説然湯伐桀方還至亳豈能使賁若華盛乎夏説本於蘇而其文尤明順故止載夏説他多類此或問夏氏曰乃亦有終非特王國社禝可保其有終爾諸侯亦可終享安榮之福如何曰此雖説得乃字分明亦恐傷巧或問王氏衷訓中當矣而孔氏訓為善何也曰惟中故善偏於剛則暴偏於柔則儒是所謂惡也或問王氏謂善者常性也不善非常性也不幾於善惡混乎曰程子謂有義理之性有血氣之性血氣之性有善有不善義理之性無不善常性義理之性也非常性則血氣之性也水性本清鐡氣本剛而或濁或軟者亦不可謂非二物之性然謂水性濁鐡性軟則不可蓋謂清與剛者其常性濁與軟者非其常性也至於濁者澄則清軟者鍊則剛則學者有變化氣質之功焉伊訓或問孟子言湯崩太丁未立外丙二年仲壬四年如何曰孔氏謂太丁未立而卒程氏謂年齒也外丙方二歲仲壬方四歲故立太甲此説是也邵康節皇極經世書起於堯即位之甲辰至於本朝之嘉祐厯譜帝王世次湯起乙未太甲起戊申無外丙仲壬也曰蘇氏謂成湯既沒太甲元年乃湯沒後伊尹稱德作訓於太甲之初非湯崩之年即太甲元年也如何曰謂湯崩甲立非同一年則可謂中間猶隔七年則非成湯既沒而以太甲元年繼之則太甲繼湯明矣況康節厯數古今莫加所譜悉與經合又何疑乎或問罔有天災作災異説皇天降災作災禍説同字而異訓可乎曰説經者當觀上下文意固難執一况天災則是形變於天言降災則禍降於人矣要其災雖有在天在人與夫淺深之異其為災亦一也或説造攻自鳴條朕哉自亳云造為攻伐之功雖自鳴條而我積德基念始自亳都者固有素矣亦通或問布昭聖武聖是聖德武是武德猶乃聖乃神乃武乃文也如何曰如此説亦可但聖德言布昭則未安聖武猶神武之謂而昭者則我武維揚之謂也或謂人紀或以為三綱五常如何曰三綱者君為臣綱父為子綱夫為妻綱也五常仁義禮智信也言五典則綱常已在其中三綱有紀之意而不如五典之備五常該五典之德然又無人倫相紀之意也或問湯之得天下也甚難故其慮天下也甚逺是以敷求哲人以輔後嗣如何曰聖人之於天下非因其難得而後始慮之逺也以此戒後人則可謂聖人之本心如此則不然聖人既受天下之責則不得不為無窮之慮其得天下本出於無心至守天下則無不盡其心若謂因得之難而後慮之逺則舜自側微三載而陟帝位將不逺慮乎此殆可以論常人之心而非所以論聖人也至如漢髙祖唐太宗奮自匹夫不數年得天下其慮天下亦豈不逺哉或問古者刑不上大夫而云其刑墨何也曰意其必有贖當如舜之贖刑及今世之律也林氏謂昌邑王廢羣臣多坐無輔導之益受誅惟王吉龔遂以數諫諍免是亦臣下不正其刑墨之意也此説亦善或問呂氏謂有一於身者非謂止有一也蓋有其一則九者從之有云者針其病於未萌也如何曰此蓋謂有其一則未必至於喪亡耳夫九者之病固有相應然若耽於一喪亡必至親見士大夫子弟有以琴棋詩酒器玩書畫而亡其家者蓋心溺於此則餘事盡廢此數者皆世所謂雅好猶足以亡身亡家況此九者何必備而後至喪亡乎哉或問唐孔氏謂爾為德無小亦足以為萬邦之慶如何曰此説於罔大罔小之辭雖順然未免以辭害意非惟非責難於君之意然亦無此理堯舜之德猶以博施濟衆為病豈小德而可為萬邦之慶哉漢元成殤唐僖昭非有大惡而皆至於亡國林氏舉唐桞玭言謂實德懿行人未必信纎瑕微纇十手率指此足以發明伊尹之意矣曰三山陳氏謂勿以小善而不為極其至則萬邦胥慶勿以小惡而為之極其至則墜其宗此説如何曰此又未免添極其至而為説也曰然則小惡果足以覆宗乎曰此即所謂有一於此未或不亡之意也太甲上中或問魯氏曰伊訓元祀十有二月至此三祀十二月朔適合禮經所謂三年之喪二十五月而畢於此為即吉之月明矣二十五月喪畢者啇制二十七月終喪者周制也此説如何曰所謂二十五月而畢者以除喪服言也二十七月而畢者連禫服言也魯氏此説雖偶合二十五月之數以為商制未必然若然則是成湯在太甲元祀十二月沒而太甲於柩前改年而不待踰年也可乎太甲下林叔豹義曰人情莫不好人之順已而惡人之逆已君子直諒每犯人之所惡小人苟合每逢人之所好言逆乎心雖未必盡君子之言然驗其所從來彼何區區投吾以所惡哉是必有公信之道存乎其間也惟忠言可以逆吾心而吾不可以逆乎道必反而以道求之則苦口之藥不以逆我而拒也言遜乎志雖未必盡小人之言然驗其所從來彼何區區投吾以所好哉是必有私邪之道存乎其間也惟甘言可以遜吾志而志不可以遜乎非道必反而以非道求之則甘言之疾不以其遜我而受也雖然言之逆者固欲求諸道然外為訐直而內懷姦詐者有之言之遜者固欲求諸非道然比言無所排擊將順無所拂辭者有之聼言之道豈可以一律觀也夫惟以道求之則君子小人之情舉無所逃矣且居中虛者心也有所向則謂之志心一而志百故不若志之易惑於求諸道言逆汝心所以明忠言入心之難於求非道言遜汝志所以明謏言惑志之易又況逆者有對順之名不曰順而曰遜所以明小人乘人之忽若浸潤膚受其柔行巽入之道不可不早辨也咸有一德或問一德之為純一何也曰凡天下之物純則一雜則二三故一念慮之純亦一也一事為之純亦一也苟念此而雜之以彼則其所念不一矣為此而雜之以彼則其所為不一矣凡事之小大雖不同然其義之所歸皆在於純而不雜也天地之間惟天德為至一蓋剛健純粹其體則一未始有物以雜之也是以一元之氣晝夜昏明春秋冬夏百千萬變未嘗有一息之謬飛潛動植洪纎巨細皆得其性命形體之正而未嘗有一事之差故曰其為物不二則其生物不測又曰天得一以清以人言之惟聖人之德為至一蓋聖人氣質清純渾然天理初無一毫人欲之間以言其仁則一於仁而無一毫之不仁以雜之以言其義則一於義而無一毫之不義以雜之其為德也固舉天下之善而無纎毫之或遺而所以為善又極天下之至純而無纎毫之或雜故曰文王之德之純又曰聖人之德一以為天下正常人莫不有是一德然未免為私欲所雜是以其德常不一故仁或雜之以忮害則非一於仁義或雜之以貪得則非一於義禮或雜之以驕惰知或雜之以昏蔽則非一於禮知矣內外隱顯之間常不免於二致甚至於不常其德而為小人之歸則以其二者雜之也林氏曰伊尹告太甲召公告成王皆謂天命不可必而人事為可必夫中才庸主偃然自肆不以安危為意者惟其恃天命廢人事故敗亡而不自知唐德宗與李泌論建中之亂以為出於天命李泌曰命者它人尚可言惟君相不可言命蓋君相造命者也若言命則禮樂刑政皆無所用矣蓋與咸有一德召誥之言亦相似林氏曰惟一故常惟常故一蘇氏曰惟一故新惟新故一一故不流新故不敝亦善或問七世之廟可以觀德諸説如何孔氏曰立七廟有德之君則為祖宗其廟不毁故可觀德不孫氏曰天子祖有功而宗有德故雖七世而其廟毁七廟者漢世以來論之多矣鄭康成謂夏五廟無太祖禹二昭二穆殷七廟契禹湯及二昭二穆周則七廟后稷為始祖文武受命而王三廟不毁與二昭二穆而七此説妄也天子七廟之制久矣虞書所謂六宗并藝祖之廟七與祭法王制之言相合王肅謂七廟者天子之常禮考於此信矣曰七廟固當以祭法王制之言為當但諸家皆謂三昭三穆親盡則毁有德則為祖宗而不毁如此則太祖之外更加以宗如殷之後王既以湯為太祖又加三宗則連三昭三穆為十廟矣周以后稷為祖文武為宗加以三昭三穆則九廟矣將廢昭穆近親而湊成七廟則子孫未免薄其所近之祖禰將别立所宗之廟則又非七廟之制當缺以俟知者若觀德之説如從蘇氏之言推明之庶與前説無礙耳林氏曰論協於克一必以萬姓咸曰為言至於無自廣以狹人則曰匹夫匹婦不獲自盡亦猶言爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗亦善或問吕氏曰七廟以觀德則合古今為一體萬夫之長以觀政則合衆寡為一體君使民民事君則合君民為一體不自廣以狹人則合人已為一體如何曰一之説前已見矣非謂對二物而合為一也此説雖合二物而為一而終不免有四者之異將合四者以為一而四者又不能不異矣盤庚上三山陳氏曰有虞氏未施信而民信治水征苖未嘗有言盤庚遷都民咨胥怨諄復告語至於三書世變既降風俗衰而號令繁然讀是書者可以見三代君民相與之道夫王者與衆同欲豈樂於違衆所以違衆者從天下之公理也大公所在事久論定向之怨者今皆安之則王者所謂違衆是乃從衆也林氏曰先王創業垂統以貽萬世之業必有根本之地蓋其王業之所始天命人心之所係其子孫守之則興不能守之則廢若湯之亳文武之豐鎬是也夫仲丁遷囂之後失成湯根本之地經歷九世數百年間無勃然興者盤庚既遷亳商家社稷於是復興周自平王東遷不復有還居豐鎬之意傳世數十不復能振由其失文武根本之地故也三山陳氏曰天命既曰在天而曰恪謹天命罔知斷命天其永命何也大扺古人以當然之理為命而不以或然之數為命敕天之命祈天永命皆自己而言之若在己不能盡其當然之理立乎巖牆之下與陷於桎梏而死語人曰此命也可乎如盤庚不遷都而耿邑有河患民不聊生國將滅亡而歸之命可乎循乎理之當然則得其命之正者也林氏曰序言盤庚五遷將治亳殷是自湯至盤庚方及五遷今言於今五邦又繼以今不承於古罔知天之斷命則是盤庚之前所遷者既有五邦矣考之前序但言亳囂相耿四邦不知何以為五邦若併以盤庚之遷為五邦不惟文勢不應如此而所遷乃復歸於亳謂之五遷則可謂之五邦則不可故太史公謂祖己自耿遷於邢汲冢記年謂祖乙遷於奄皆與序文相戾不可據意者自仲丁至盤庚有一遷而史臣失之盤庚據當時所見而言當得其實歷世久逺不可臆度此説如何曰按書序言自契至湯凡八遷湯始居亳從先王居則是湯未遷亳之前所居為一邦也特未知為何地耳總而數之是為五邦或問呂氏曰民不肯遷常情則惟恐聞其言今却使無伏小人之針蓋民之忿心不當禁遏使其發於言語方可殺其怒如秦之誹謗者族民不敢進一語而怒心日長矣曰此説自善夫帝王雖無事之時猶稽衆從人況大事方舉上下危疑豈可不以逹民言為急兼遷國重事利害多端小民之針豈無可以補缺失禆廟算者又豈無與我同意而欲遷者其言之是邪吾從而采之可以感恱人心言之非邪亦可因其所蔽之端開導之以服其心非止於殺其忿怒而已小人之針猶不敢伏況其上者乎此與後世違衆舉事雖朝廷近臣鉗結而不敢言者異矣陳少南曰自古君子行事未必盡是庸常之人未必盡非惟君子至公無我曲盡下情訂其是非不以人言之異同為意也常人私心勝而客氣髙不顧事之是非以論人言之同異往往務為刑罰以甘心於異己者雖事當功成而天下亦由是而不服矣夏氏曰耿地舄鹵不利小民必有欲遷者民欲遷而上未遷必有針規之言故盤庚使不得遏伏之兩説亦各有意或問王用丕欽罔有逸言民用丕變正猶出入起居罔有不欽發號施令罔有不臧下民祗若亦通陳少南曰盤庚之遷其事不可已向使其不欲遷者以告盤庚將遂中輟乎曰可否相濟君臣之常使其告也盤庚尚得而開喻之人不告盤庚而以浮言沉陷衆庶蓋浮偽而不實矣此説亦善或問東坡人舊則習器舊則弊當使舊人用新器我所以從老成之言而遷新邑也荆公亦同此説如何曰林氏謂雖有器非求舊惟新之言然盤庚舉此但以證人惟求舊耳故下文繼以古我先王暨乃祖乃父文勢首尾相類無取於器非求舊以為新邑之喻也此説辨之當矣兼今曰新邑乃是先王舊邑豈果是求新乎是正與盤庚紹復先王之意相反也或問孔氏謂古者功臣配食於廟如何曰配者對也郊祀后稷以配天宗祀文王於明堂以配上帝所對止一人耳配食乃大勳勞之人方配非遍及有功之人此言與享正猶司勳謂凡有功者祭諸大蒸非可以配享言況盤庚總告羣臣羣臣之祖又豈盡皆配享乎盤庚中林氏曰蘇氏曰民之不率不以刑罰齊之而以話言曉之此盤庚之仁也夫民怨誹逆命而盤庚終不怒引咎自責反覆告訓以言代斧鉞忠厚之至此言深得盤庚之旨呂氏曰汝若不略稽考當遷利害但自忿怒何緣得平凡人有忿怒之心則見此而不見彼若暫時稽考其怒自瘳呂氏曰遷都機會止有今日若不乘今而遷則生業將為水壞汝何以生在上乎林氏曰黃博士曰天以人因人以天成蓋義與命相待而立故承古以遷則天其永我命于兹新邑盤庚所以逆其命之至繼其命之絶使爾有衆復生在上也此説甚善人主造命而不可言命盤庚所謂迓續乃命於天其義尤深切著明易曰鼓萬物而不與聖人同憂蓋天之應物禍福吉凶之來皆以類至而聼其自取爾初未嘗容心故其命靡常而不可必其有治無亂有安無危也聖人之所以應天者禍福吉凶之來而吾必有憂患之心故能轉禍為福去凶為吉至於將危亂之際皆有續之道焉如堯生丹朱舜生啇均傳以天下必有危亂之道堯舜知其危亂將荼毒生民而不可救於是續民命於天而堯以位授舜舜以位授禹則斯民復享治安無異於堯舜在位之時而不見夫丹朱啇均之患豈非聖人有憂天下之心能迓續民命於天乎故凡聖賢之君當危亂之機己萌必有所變更而振起之皆所以續民命豈獨盤庚哉明此道謂之知命不明此道謂之不知命伊川有言曰天命不可易也然有可易者惟有德者能之愚按關子明筮書所謂卜筮兆將然之機人事萌未然之應邵康節所謂不由天地只由人者皆此理也盤庚下林氏曰乃正厥位先儒以為正郊廟朝社之位夫盤庚之營亳邑將必先定郊廟朝社之禮然後遷而居之不應既遷而後定位也按召公營洛既得卜則經營至於位成周公乃逹觀於新邑營所謂正厥位者乃正臣民之位登進於朝而慰撫告諭之也此説善或問呂氏曰盤庚遷都既有篤敬之臣又有至善之謀盤庚初不言有此等人為我畫䇿至事定日方語此蓋聖賢以一己任怨方萬民有怨之時聖賢不欲分怨於下故不言也此説固善然成王東征曰爽邦由哲民獻豫翼豈分怨於人乎曰以盤庚為君主此謀於上民猶有怨使盤庚遽推其謀於臣下則民愈不服矣東征之舉周公自處危疑之地故不得不援賢者以為證其事體與盤庚又不同矣書集傳或問卷上
